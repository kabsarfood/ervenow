<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>لوحة المندوب | ERVENOW</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
      body { margin: 0; font-family: Cairo, sans-serif; background: #f8f4ef; color: #2b1f16; }
      .wrap { max-width: 960px; margin: 20px auto; padding: 14px; }
      .top { display: flex; gap: 10px; justify-content: space-between; align-items: center; flex-wrap: wrap; margin-bottom: 12px; }
      .btn { border: 0; border-radius: 10px; padding: 9px 12px; cursor: pointer; font-family: inherit; font-weight: 700; }
      .btn-primary { background: #5b371d; color: #fff; }
      .btn-ghost { border: 1px solid #5b371d; background: #fff; color: #5b371d; text-decoration: none; display: inline-block; }
      .card { background: #fff; border: 1px solid #e5d8cb; border-radius: 14px; padding: 12px; margin-bottom: 10px; }
      .meta { color: #6e5a4a; font-size: .9rem; margin-top: 6px; }
      .row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
      #driverMap { min-height: 300px; width: 100%; border-radius: 12px; overflow: hidden; border: 1px solid #e5d8cb; }
      @media (max-width: 768px) { #driverMap { min-height: 240px; } }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="top">
        <h2 style="margin:0;color:#5b371d">لوحة المندوب</h2>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button class="btn btn-primary" id="refreshBtn">تحديث</button>
          <a class="btn btn-ghost" href="/driver-wallet">المحفظة</a>
          <a class="btn btn-ghost" href="/orders">طلبات المنصة</a>
          <a class="btn btn-ghost" href="/track">صفحة التتبع</a>
          <button class="btn btn-ghost" id="logoutBtn">خروج</button>
        </div>
      </div>
      <div class="card">
        <strong>💰 رصيدك</strong>
        <div class="meta" id="walletLine">جارٍ تحميل المحفظة...</div>
      </div>
      <div class="card">
        <strong>🗺️ خريطة التوصيل (المندوب / زائر المنصة)</strong>
        <p class="meta">تظهر هنا حركة موقعك مباشرة وموقع زائر المنصة للطلب الجاري.</p>
        <div id="driverMap"></div>
      </div>
      <div id="ordersBox"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="/assets/cart.js"></script>
    <script src="/assets/api-config.js"></script>
    <script src="/assets/api.js"></script>
    <script>
      var token = window.PlatformAPI.getToken();
      if (!token) {
        location.href = "/driver-login";
      }

      var knownOrders = [];
      var poll = null;
      var activeOrderIds = [];
      var activeOrder = null;
      var notifyAudio = null;
      var driverMap = null;
      var myMarker = null;
      var customerMarker = null;
      var watchId = null;

      function ensureDriverMap() {
        if (driverMap || typeof L === "undefined") return;
        driverMap = L.map("driverMap").setView([24.7136, 46.6753], 12);
        L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
          attribution: "&copy; OpenStreetMap contributors",
        }).addTo(driverMap);
      }

      function updateMyMarker(lat, lng) {
        ensureDriverMap();
        if (!driverMap) return;
        var ll = [Number(lat), Number(lng)];
        if (!Number.isFinite(ll[0]) || !Number.isFinite(ll[1])) return;
        if (!myMarker) {
          myMarker = L.marker(ll, { title: "موقعي" }).addTo(driverMap).bindPopup("🚚 موقعك");
        } else {
          myMarker.setLatLng(ll);
        }
        if (!customerMarker) driverMap.setView(ll, 14);
      }

      function updateCustomerMarker(order) {
        ensureDriverMap();
        if (!driverMap) return;
        if (!order) {
          if (customerMarker) {
            driverMap.removeLayer(customerMarker);
            customerMarker = null;
          }
          return;
        }
        var lat = Number(order.drop_lat);
        var lng = Number(order.drop_lng);
        if (!Number.isFinite(lat) || !Number.isFinite(lng)) return;
        var ll = [lat, lng];
        if (!customerMarker) {
          customerMarker = L.marker(ll, { title: "موقع زائر المنصة" }).addTo(driverMap).bindPopup("👤 زائر المنصة");
        } else {
          customerMarker.setLatLng(ll);
        }
        var bounds = L.latLngBounds([]);
        if (myMarker) bounds.extend(myMarker.getLatLng());
        bounds.extend(customerMarker.getLatLng());
        if (bounds.isValid()) driverMap.fitBounds(bounds.pad(0.25));
      }

      function playNewOrderSound() {
        try {
          if (!notifyAudio) notifyAudio = new Audio("/assets/notification.mp3");
          notifyAudio.play().catch(function () {
            var fallback = new Audio("/sound.mp3");
            fallback.play().catch(function () {});
          });
        } catch (e) {}
      }

      function mkBtn(label, cls, click) {
        var b = document.createElement("button");
        b.className = "btn " + cls;
        b.innerText = label;
        b.onclick = click;
        return b;
      }

      function startLocationTracking() {
        if (!navigator.geolocation) return;
        if (watchId != null) {
          try { navigator.geolocation.clearWatch(watchId); } catch (_e) {}
        }
        watchId = navigator.geolocation.watchPosition(function (pos) {
          var lat = pos.coords.latitude;
          var lng = pos.coords.longitude;
          updateMyMarker(lat, lng);
          var body = { lat: lat, lng: lng };
          if (activeOrder && activeOrder.id) body.order_id = activeOrder.id;
          window.PlatformAPI.api("/api/driver/update-location", {
            method: "POST",
            body: body,
          }).catch(function () {});
        });
      }

      async function loadOrders() {
        try {
          var j = await window.PlatformAPI.api("/api/driver/orders");
          var orders = j.orders || [];
          var ids = orders.map(function (o) { return o.id; });
          if (ids.some(function (id) { return knownOrders.indexOf(id) === -1; })) {
            playNewOrderSound();
          }
          knownOrders = ids;
          activeOrderIds = orders
            .filter(function (o) {
              return o.driver_id && (o.delivery_status === "accepted" || o.delivery_status === "delivering");
            })
            .map(function (o) {
              return o.id;
            });
          activeOrder =
            orders.find(function (o) {
              return o.driver_id && (o.delivery_status === "accepted" || o.delivery_status === "delivering");
            }) || null;
          updateCustomerMarker(activeOrder);

          var box = document.getElementById("ordersBox");
          box.innerHTML = "";
          if (!orders.length) {
            box.innerHTML = '<div class="card">لا توجد طلبات حالياً</div>';
            return;
          }

          orders.forEach(function (o) {
            var c = document.createElement("div");
            c.className = "card";
            c.innerHTML =
              "<strong>" + (o.order_number || o.id) + "</strong>" +
              '<div class="meta">الحالة: ' + (o.delivery_status || "new") + "</div>" +
              '<div class="meta">الاستلام: ' + (o.pickup_address || "—") + "</div>" +
              '<div class="meta">التسليم: ' + (o.drop_address || "—") + "</div>";
            var row = document.createElement("div");
            row.className = "row";

            if ((o.delivery_status === "new" || o.delivery_status === "pending") && !o.driver_id) {
              row.appendChild(
                mkBtn("قبول الطلب", "btn-primary", safeClick(async function () {
                  try {
                    var r = await window.PlatformAPI.api("/api/driver/accept/" + o.id, { method: "POST" });
                    if (r.accepted === false) return showError(r.message || "تم استلامه");
                    showSuccess("تم قبول الطلب");
                    loadOrders();
                  } catch (e) { showError(e.message || "خطأ القبول"); }
                }))
              );
            }

            if (o.delivery_status === "accepted") {
              row.appendChild(
                mkBtn("بدء التوصيل", "btn-ghost", safeClick(async function () {
                  try {
                    await window.PlatformAPI.api("/api/driver/start-delivery/" + o.id, { method: "POST" });
                    showSuccess("تم بدء التوصيل");
                    loadOrders();
                  } catch (e) { showError(e.message || "تعذر البدء"); }
                }))
              );
            }

            if (o.delivery_status === "delivering" || o.delivery_status === "accepted") {
              row.appendChild(
                mkBtn("إنهاء الطلب", "btn-primary", safeClick(async function () {
                  try {
                    await window.PlatformAPI.api("/api/driver/complete-order/" + o.id, { method: "POST" });
                    showSuccess("تم إنهاء الطلب");
                    loadOrders();
                  } catch (e) { showError(e.message || "تعذر الإنهاء"); }
                }))
              );
            }

            c.appendChild(row);
            box.appendChild(c);
          });
        } catch (e) {
          showError(e.message || "تعذر تحميل الطلبات");
        }
      }

      async function loadWallet() {
        try {
          var j = await window.PlatformAPI.api("/api/driver/wallet");
          document.getElementById("walletLine").innerText =
            "الرصيد: " + (j.balance || 0) + " ريال | المكتسب: " + (j.total_earned || 0) + " ريال";
        } catch (e1) {
          try {
            var w = await window.PlatformAPI.api("/api/wallet");
            document.getElementById("walletLine").innerText =
              "الرصيد: " + (w.balance || 0) + " ريال | المكتسب: " + (w.total_earned || 0) + " ريال";
          } catch (e2) {
            document.getElementById("walletLine").innerText = "تعذر تحميل المحفظة";
          }
        }
      }

      function startTrackingLoop() {
        if (poll) clearInterval(poll);
        poll = setInterval(function () {
          loadOrders();
        }, 5000);
      }

      document.getElementById("refreshBtn").onclick = loadOrders;
      document.getElementById("logoutBtn").onclick = function () {
        try {
          localStorage.removeItem("userPhone");
        } catch (err) {}
        window.PlatformAPI.setToken("");
        location.href = "/driver-login";
      };

      loadOrders();
      loadWallet();
      startTrackingLoop();
      startLocationTracking();
    </script>
  </body>
</html>
