<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ERVENOW | التقرير المالي</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body>
    <div class="layout">
      <div class="top-nav">
        <h1 style="margin: 0">تقرير يومي (إدارة)</h1>
        <div class="btn-row">
          <a class="btn btn-ghost" href="/">رئيسية</a>
          <a class="btn btn-ghost" href="/admin-approvals">الموافقات</a>
        </div>
      </div>
      <p class="sub">سجّل دخولاً بحساب <strong>admin</strong> ثم حدّث التقرير.</p>

      <div class="card">
        <div class="badge">اليوم</div>
        <pre id="reportOut" style="margin-top: 10px; white-space: pre-wrap; font-size: 1rem" translate="no">—</pre>
        <button type="button" class="btn btn-primary" id="btnReport" style="margin-top: 12px">تحديث التقرير</button>
      </div>

      <div class="card">
        <div class="badge">طلبات السحب</div>
        <pre id="withdrawOut" style="margin-top: 10px; white-space: pre-wrap; font-size: 0.85rem; max-height: 320px; overflow: auto" translate="no">—</pre>
        <button type="button" class="btn btn-ghost" id="btnWithdraws" style="margin-top: 8px">تحميل الطلبات</button>
      </div>
    </div>
    <script src="/assets/api-config.js"></script>
    <script src="/assets/api.js"></script>
    <script>
      if (!window.PlatformAPI.getToken()) {
        location.href = "/login";
      }

      async function loadReport() {
        var el = document.getElementById("reportOut");
        el.textContent = "جارٍ التحميل…";
        try {
          var j = await window.PlatformAPI.api("/api/admin/daily-report");
          el.textContent =
            "عدد الطلبات: " +
            j.totalOrders +
            "\nأرباح المنصة (عمولة تقريبية): " +
            j.totalPlatform +
            " ريال" +
            "\nضريبة القيمة المضافة (15%): " +
            (j.totalVAT != null ? j.totalVAT : 0) +
            " ريال" +
            "\nإجمالي المبيعات (شامل الضريبة): " +
            (j.totalRevenue != null ? j.totalRevenue : 0) +
            " ريال" +
            "\nأرباح المناديب (أجر توصيل): " +
            j.totalDrivers +
            " ريال\nالتاريخ (الرياض): " +
            j.date;
        } catch (e) {
          el.textContent = e.message || "خطأ — يجب أن تكون أدمن";
        }
      }

      async function loadWithdraws() {
        var el = document.getElementById("withdrawOut");
        el.textContent = "جارٍ التحميل…";
        try {
          var j = await window.PlatformAPI.api("/api/admin/withdraws");
          el.textContent = JSON.stringify(j.requests || [], null, 2);
        } catch (e) {
          el.textContent = e.message || "خطأ";
        }
      }

      document.getElementById("btnReport").onclick = loadReport;
      document.getElementById("btnWithdraws").onclick = loadWithdraws;
    </script>
  </body>
</html>
