<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="robots" content="noindex, nofollow" />
    <title>دخول الإدارة | ERVENOW</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <style>
      body { margin: 0; font-family: Cairo, sans-serif; background: #f8f4ef; color: #2b1f16; }
      .wrap { max-width: 520px; margin: 48px auto; padding: 16px; }
      .card { background: #fff; border: 1px solid #e5d8cb; border-radius: 14px; padding: 16px; }
      h2 { margin: 0 0 10px; color: #5b371d; }
      p { margin: 0 0 10px; color: #6e5a4a; }
      input { width: 100%; box-sizing: border-box; margin-top: 8px; padding: 10px; border-radius: 10px; border: 1px solid #d7c6b5; font-family: inherit; }
      .row { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
      button, a.btn { border: 0; border-radius: 10px; padding: 10px 12px; cursor: pointer; font-family: inherit; font-weight: 700; text-decoration: none; display: inline-block; }
      .btn-primary { background: #5b371d; color: #fff; }
      .btn-ghost { border: 1px solid #5b371d; background: #fff; color: #5b371d; }
      #msg { margin-top: 10px; color: #6e5a4a; font-size: .92rem; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h2>🔐 دخول الإدارة</h2>
        <p>مسار داخلي — أدخل رقم الجوال المصرّح ثم رمز واتساب.</p>
        <p>صلاحية الرمز 5 دقائق.</p>

        <input id="phone" type="tel" inputmode="numeric" autocomplete="tel-national" maxlength="14" placeholder="05xxxxxxxx" />
        <div class="row">
          <button class="btn-primary" id="sendBtn" type="button">إرسال كود</button>
        </div>

        <input id="code" placeholder="رمز التحقق" />
        <div class="row">
          <button class="btn-primary" id="verifyBtn" type="button">دخول</button>
          <a class="btn btn-ghost" href="/">الرئيسية</a>
        </div>

        <p id="msg"></p>
      </div>
    </div>

    <script src="/assets/api-config.js"></script>
    <script src="/assets/api.js"></script>
    <script>
      function normalizeAdminPhone(v) {
        var d = String(v || "").replace(/\D/g, "");
        if (d.startsWith("9665") && d.length === 12) return "0" + d.slice(3);
        if (d.startsWith("5") && d.length === 9) return "0" + d;
        return d.slice(0, 10);
      }

      function isValid05(v) {
        var d = normalizeAdminPhone(v);
        return /^05\d{8}$/.test(d);
      }

      function setMsg(text) {
        document.getElementById("msg").innerText = text || "";
      }

      function mapOtpError(msg) {
        var m = String(msg || "");
        if (m.indexOf("منتهي") !== -1 || m.indexOf("غير صحيح") !== -1) {
          return "رمز واتساب غير صحيح أو منتهي. صلاحية الرمز 5 دقائق.";
        }
        return m;
      }

      async function sendOtp() {
        var phone = normalizeAdminPhone(document.getElementById("phone").value || "");
        if (!phone) return setMsg("أدخل رقم الجوال أولاً");
        if (!isValid05(phone)) return setMsg("أدخل رقم سعودي يبدأ بـ 05 (10 أرقام)");
        setMsg("جارٍ إرسال الكود...");
        try {
          var r = await fetch(window.PlatformAPI.apiUrl("/api/core/send-otp"), {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ phone: "+966" + phone.slice(1), role: "admin" }),
          });
          var j = await r.json().catch(function () { return {}; });
          if (!r.ok || !j.ok) throw new Error(j.error || "تعذر إرسال الكود");
          setMsg("تم إرسال رمز واتساب إلى رقم الأدمن. صلاحية الرمز 5 دقائق.");
        } catch (e) {
          setMsg(mapOtpError(e.message || "فشل الإرسال"));
        }
      }

      async function verifyOtp() {
        var phone = normalizeAdminPhone(document.getElementById("phone").value || "");
        var code = (document.getElementById("code").value || "").trim();
        if (!phone || !code) return setMsg("أدخل رقم الجوال والرمز");
        if (!isValid05(phone)) return setMsg("أدخل رقم سعودي يبدأ بـ 05 (10 أرقام)");
        setMsg("جارٍ التحقق...");
        try {
          var res = await fetch(window.PlatformAPI.apiUrl("/api/core/verify-otp"), {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ phone: "+966" + phone.slice(1), code: code, role: "admin" }),
          });
          var data = await res.json().catch(function () { return {}; });
          if (!res.ok || !data.token) throw new Error(data.error || "فشل التحقق");
          localStorage.setItem("token", data.token);
          if (window.PlatformAPI && typeof window.PlatformAPI.setToken === "function") {
            window.PlatformAPI.setToken(data.token);
          } else {
            localStorage.setItem("ervenow_access_token", data.token);
          }
          window.location.href = "/admin-dashboard";
        } catch (e) {
          setMsg(mapOtpError(e.message || "فشل الدخول"));
        }
      }

      document.getElementById("sendBtn").onclick = sendOtp;
      document.getElementById("verifyBtn").onclick = verifyOtp;
    </script>
  </body>
</html>
