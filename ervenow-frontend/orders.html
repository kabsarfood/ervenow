<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>ERVENOW | إدارة الطلبات</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/assets/styles.css" />
    <style>
      .drv-orders {
        max-width: 900px;
        margin: 0 auto;
        padding: 12px 14px 28px;
        padding-bottom: max(28px, env(safe-area-inset-bottom));
      }
      .drv-top {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 14px;
        padding-bottom: 12px;
        border-bottom: 1px solid rgba(91, 55, 29, 0.15);
      }
      .drv-phone {
        font-weight: 800;
        font-size: 1rem;
        color: #3d2213;
        letter-spacing: 0.02em;
      }
      .drv-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
      }
      .drv-actions .btn {
        padding: 8px 12px;
        font-size: 0.88rem;
      }
      .drv-section {
        margin-top: 18px;
      }
      .drv-section h2 {
        margin: 0 0 10px;
        font-size: 1.05rem;
        color: #3d2213;
      }
      .drv-summary {
        font-size: 0.88rem;
        color: #6e5a4a;
        margin-bottom: 10px;
      }
      .drv-table {
        width: 100%;
        border-collapse: separate;
        border-spacing: 0;
        background: #fff;
        border: 1px solid rgba(91, 55, 29, 0.12);
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 1px 0 rgba(0, 0, 0, 0.04);
      }
      .drv-table thead th {
        text-align: right;
        font-size: 0.78rem;
        font-weight: 800;
        color: #5b371d;
        background: #faf6f0;
        padding: 10px 12px;
        border-bottom: 1px solid rgba(91, 55, 29, 0.1);
      }
      .drv-table tbody td {
        padding: 12px;
        vertical-align: middle;
        border-bottom: 1px solid rgba(0, 0, 0, 0.06);
        font-size: 0.9rem;
      }
      .drv-table tbody tr:last-child td {
        border-bottom: 0;
      }
      .drv-num {
        font-weight: 800;
        color: #1a120c;
      }
      .drv-actions-cell {
        white-space: nowrap;
      }
      .drv-actions-cell .btn {
        padding: 8px 14px;
        font-size: 0.85rem;
      }
      .drv-empty {
        padding: 20px 14px;
        text-align: center;
        color: #6e5a4a;
        background: #fffdf9;
        border: 1px dashed rgba(91, 55, 29, 0.2);
        border-radius: 12px;
        font-size: 0.92rem;
      }
      .drv-cards-mobile {
        display: none;
        flex-direction: column;
        gap: 10px;
      }
      .drv-mcard {
        background: #fff;
        border: 1px solid rgba(91, 55, 29, 0.12);
        border-radius: 12px;
        padding: 12px;
      }
      .drv-mrow {
        display: flex;
        justify-content: space-between;
        gap: 8px;
        margin-bottom: 6px;
        font-size: 0.9rem;
      }
      .drv-mrow:last-of-type {
        margin-bottom: 10px;
      }
      .drv-mrow span:first-child {
        color: #6e5a4a;
        font-size: 0.82rem;
      }
      @media (max-width: 640px) {
        .drv-table-wrap {
          display: none;
        }
        .drv-cards-mobile {
          display: flex;
        }
        .drv-top {
          flex-direction: column;
          align-items: stretch;
        }
        .drv-actions {
          justify-content: flex-start;
        }
      }
      .alert {
        padding: 12px;
        border-radius: 10px;
        background: #fff4e8;
        border: 1px solid #f0c991;
        color: #7a4f1d;
        margin-top: 12px;
      }
    </style>
  </head>
  <body>
    <div class="layout drv-orders">
      <div class="drv-top">
        <div class="drv-phone" id="phoneLine" translate="no">—</div>
        <div class="drv-actions">
          <button class="btn btn-primary" id="refreshBtn" type="button">تحديث</button>
          <a class="btn btn-ghost" href="/driver-wallet">المحفظة</a>
          <a class="btn btn-ghost" href="/track">التتبع</a>
          <a class="btn btn-ghost" href="/">الرئيسية</a>
          <a class="btn btn-ghost" href="/login" id="logoutBtn">خروج</a>
        </div>
      </div>

      <div class="top-nav" style="margin-bottom: 4px; padding-bottom: 0; border: none">
        <h1 style="margin: 0; font-size: 1.25rem">إدارة الطلبات</h1>
      </div>

      <div class="drv-section" id="secAvailable">
        <h2>الطلبات المتاحة</h2>
        <p class="drv-summary" id="summaryAvailable">—</p>
        <div class="drv-table-wrap" id="wrapAvailable"></div>
        <div class="drv-cards-mobile" id="cardsAvailable"></div>
      </div>

      <div class="drv-section" id="secMine">
        <h2>طلباتي النشطة</h2>
        <p class="drv-summary" id="summaryMine">—</p>
        <div class="drv-table-wrap" id="wrapMine"></div>
        <div class="drv-cards-mobile" id="cardsMine"></div>
      </div>

      <div id="msg" class="alert" style="display: none"></div>
    </div>

    <audio id="newOrderSound" src="/sound.mp3" preload="auto"></audio>

    <script src="/assets/api-config.js"></script>
    <script src="/assets/api.js"></script>
    <script>
      var token = window.PlatformAPI.getToken();
      var meUser = null;
      var lastPendingCount = 0;
      var pollTimer = null;
      var activeOrderIds = [];
      var locationTimer = null;
      var notifAsked = false;

      function showMsg(t) {
        var el = document.getElementById("msg");
        el.style.display = "block";
        el.textContent = t;
      }

      function haversineKm(lat1, lng1, lat2, lng2) {
        var R = 6371;
        var dLat = ((lat2 - lat1) * Math.PI) / 180;
        var dLng = ((lng2 - lng1) * Math.PI) / 180;
        var a =
          Math.sin(dLat / 2) * Math.sin(dLat / 2) +
          Math.cos((lat1 * Math.PI) / 180) *
            Math.cos((lat2 * Math.PI) / 180) *
            Math.sin(dLng / 2) *
            Math.sin(dLng / 2);
        return 2 * R * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
      }

      function orderKm(o) {
        var dk = Number(o.distance_km);
        if (Number.isFinite(dk) && dk > 0) return Math.round(dk * 10) / 10;
        var a = Number(o.pickup_lat),
          b = Number(o.pickup_lng),
          c = Number(o.drop_lat),
          d = Number(o.drop_lng);
        if (Number.isFinite(a) && Number.isFinite(b) && Number.isFinite(c) && Number.isFinite(d)) {
          return Math.round(haversineKm(a, b, c, d) * 10) / 10;
        }
        return null;
      }

      function orderFee(o) {
        return Math.round((Number(o.delivery_fee) || 0) * 100) / 100;
      }

      function orderNo(o) {
        return (o.order_number && String(o.order_number).trim()) || String(o.id).slice(0, 8) + "…";
      }

      function routeToMaps(order) {
        var dest = "";
        if (order.drop_lat != null && order.drop_lng != null) {
          dest = String(order.drop_lat) + "," + String(order.drop_lng);
        } else {
          dest = String(order.drop_address || "");
        }
        if (!dest) return;
        var url = "https://www.google.com/maps/dir/?api=1&destination=" + encodeURIComponent(dest);
        window.open(url, "_blank", "noopener,noreferrer");
      }

      function playNewOrderSound() {
        var snd = document.getElementById("newOrderSound");
        if (!snd || typeof snd.play !== "function") return;
        try {
          snd.currentTime = 0;
          snd.play().catch(function () {});
        } catch (e) {}
      }

      function notifyBrowserNewOrder(count) {
        if (!("Notification" in window)) return;
        if (Notification.permission === "granted") {
          try {
            new Notification("ERVENOW", {
              body: "طلب جديد في المنصة — المتاح الآن: " + count,
              tag: "ervenow-order",
            });
          } catch (e) {}
          return;
        }
        if (!notifAsked && Notification.permission === "default") {
          notifAsked = true;
          Notification.requestPermission().then(function (p) {
            if (p === "granted") notifyBrowserNewOrder(count);
          });
        }
      }

      async function acceptOrder(order) {
        try {
          var j = await window.PlatformAPI.api("/api/driver/accept/" + encodeURIComponent(order.id), {
            method: "POST",
          });
          if (j.accepted === false) {
            showMsg(j.message || "تم استلام الطلب من مندوب آخر");
            await loadOrders();
            return;
          }
          await loadOrders();
        } catch (e) {
          showMsg(e.message || String(e));
        }
      }

      async function startDelivery(order) {
        try {
          await window.PlatformAPI.api("/api/driver/start-delivery/" + encodeURIComponent(order.id), {
            method: "POST",
          });
          await sendLocationToActiveOrders();
          await loadOrders();
        } catch (e) {
          showMsg(e.message || String(e));
        }
      }

      async function completeOrder(order) {
        try {
          await window.PlatformAPI.api("/api/driver/complete-order/" + encodeURIComponent(order.id), {
            method: "POST",
          });
          await loadOrders();
        } catch (e) {
          showMsg(e.message || String(e));
        }
      }

      async function sendLocationToActiveOrders() {
        if (!activeOrderIds.length) return;
        if (!navigator.geolocation) return;
        navigator.geolocation.getCurrentPosition(
          function (pos) {
            var lat = pos.coords.latitude;
            var lng = pos.coords.longitude;
            activeOrderIds.forEach(function (id) {
              window.PlatformAPI.api("/api/driver/update-location", {
                method: "POST",
                body: { order_id: id, lat: lat, lng: lng },
              }).catch(function () {});
            });
          },
          function () {},
          { enableHighAccuracy: false, maximumAge: 8000, timeout: 10000 }
        );
      }

      function startLocationLoop() {
        if (locationTimer) clearInterval(locationTimer);
        locationTimer = setInterval(function () {
          sendLocationToActiveOrders();
        }, 5000);
      }

      function stopLocationLoop() {
        if (locationTimer) {
          clearInterval(locationTimer);
          locationTimer = null;
        }
      }

      function splitOrders(visible, meId) {
        var available = [];
        var mine = [];
        (visible || []).forEach(function (o) {
          var ds = String(o.delivery_status || o.status || "").toLowerCase();
          var open = (ds === "new" || ds === "pending") && !o.driver_id;
          if (open) {
            available.push(o);
            return;
          }
          if (o.driver_id && meId && String(o.driver_id) === String(meId)) {
            mine.push(o);
          }
        });
        return { available: available, mine: mine };
      }

      function renderTable(tbodyRowsHtml) {
        return (
          '<table class="drv-table" role="grid">' +
          "<thead><tr>" +
          "<th>طلب رقم</th>" +
          "<th>المسافة</th>" +
          "<th>السعر</th>" +
          "<th></th>" +
          "</tr></thead><tbody>" +
          tbodyRowsHtml +
          "</tbody></table>"
        );
      }

      function renderOrderRows(orders, mode) {
        var meId = meUser && meUser.id;
        if (!orders.length) {
          return { table: "", cards: '<div class="drv-empty">لا توجد طلبات.</div>' };
        }
        var tableRows = "";
        var cards = "";
        orders.forEach(function (o) {
          var ds = String(o.delivery_status || o.status || "").toLowerCase();
          var num = orderNo(o);
          var km = orderKm(o);
          var kmStr = km != null ? km + " كم" : "—";
          var fee = orderFee(o);
          var feeStr = fee.toFixed(2) + " ريال";

          var actionsHtml = "";
          if (mode === "available") {
            actionsHtml =
              '<button type="button" class="btn btn-primary btn-accept" data-id="' +
              encodeURIComponent(o.id) +
              '">قبول الطلب</button>';
          } else {
            if (ds === "accepted") {
              actionsHtml +=
                '<button type="button" class="btn btn-primary btn-start" data-id="' +
                encodeURIComponent(o.id) +
                '">استلام الطلب</button> ';
            }
            if (ds === "accepted" || ds === "delivering") {
              actionsHtml +=
                '<button type="button" class="btn btn-ghost btn-done" data-id="' +
                encodeURIComponent(o.id) +
                '">تم التسليم</button> ';
            }
            actionsHtml +=
              '<a class="btn btn-ghost" href="/track?id=' +
              encodeURIComponent(o.id) +
              '">تتبع</a> ' +
              '<button type="button" class="btn btn-ghost btn-map" data-id="' +
              encodeURIComponent(o.id) +
              '">خريطة</button>';
          }

          tableRows +=
            "<tr>" +
            '<td><span class="drv-num" translate="no">' +
            num +
            "</span></td>" +
            "<td translate=\"no\">" +
            kmStr +
            "</td>" +
            "<td translate=\"no\">" +
            feeStr +
            "</td>" +
            '<td class="drv-actions-cell">' +
            actionsHtml +
            "</td>" +
            "</tr>";

          cards +=
            '<div class="drv-mcard" data-oid="' +
            encodeURIComponent(o.id) +
            '">' +
            '<div class="drv-mrow"><span>طلب رقم</span><span class="drv-num" translate="no">' +
            num +
            "</span></div>" +
            '<div class="drv-mrow"><span>المسافة</span><span translate="no">' +
            kmStr +
            "</span></div>" +
            '<div class="drv-mrow"><span>السعر</span><span translate="no">' +
            feeStr +
            "</span></div>" +
            '<div class="drv-actions-cell" style="margin-top:4px">' +
            actionsHtml +
            "</div></div>";
        });

        return { table: renderTable(tableRows), cards: cards };
      }

      function wireOrderButtons(wrapEl, cardsEl, orders, mode) {
        function findOrder(id) {
          var u = decodeURIComponent(id);
          for (var i = 0; i < orders.length; i++) {
            if (String(orders[i].id) === u) return orders[i];
          }
          return null;
        }
        function bind(container) {
          if (!container) return;
          container.querySelectorAll(".btn-accept").forEach(function (btn) {
            btn.onclick = function () {
              var id = btn.getAttribute("data-id");
              var o = findOrder(id);
              if (o) acceptOrder(o);
            };
          });
          container.querySelectorAll(".btn-start").forEach(function (btn) {
            btn.onclick = function () {
              var o = findOrder(btn.getAttribute("data-id"));
              if (o) startDelivery(o);
            };
          });
          container.querySelectorAll(".btn-done").forEach(function (btn) {
            btn.onclick = function () {
              var o = findOrder(btn.getAttribute("data-id"));
              if (o) completeOrder(o);
            };
          });
          container.querySelectorAll(".btn-map").forEach(function (btn) {
            btn.onclick = function () {
              var o = findOrder(btn.getAttribute("data-id"));
              if (o) routeToMaps(o);
            };
          });
        }
        bind(wrapEl);
        bind(cardsEl);
      }

      function renderOrders(visible) {
        var meId = meUser && meUser.id;
        var sp = splitOrders(visible, meId);
        var av = sp.available;
        var mine = sp.mine;

        document.getElementById("summaryAvailable").textContent =
          "المتاحة للقبول: " + av.length + (av.length ? "" : " — لا توجد طلبات مفتوحة حالياً");
        document.getElementById("summaryMine").textContent =
          mine.length ? "عدد طلباتك الجارية: " + mine.length : "لا توجد طلبات مسندة إليك حالياً";

        var ra = renderOrderRows(av, "available");
        var wa = document.getElementById("wrapAvailable");
        var ca = document.getElementById("cardsAvailable");
        wa.innerHTML = av.length ? ra.table : '<div class="drv-empty">لا توجد طلبات متاحة.</div>';
        ca.innerHTML = av.length ? ra.cards : "";

        var rm = renderOrderRows(mine, "mine");
        var wm = document.getElementById("wrapMine");
        var cm = document.getElementById("cardsMine");
        wm.innerHTML = mine.length ? rm.table : '<div class="drv-empty">لا شيء هنا بعد قبول طلب.</div>';
        cm.innerHTML = mine.length ? rm.cards : "";

        wireOrderButtons(wa, ca, av, "available");
        wireOrderButtons(wm, cm, mine, "mine");
      }

      async function loadOrders() {
        try {
          var j = await window.PlatformAPI.api("/api/delivery/orders");
          var all = j.orders || [];
          var visible = all.filter(function (o) {
            var ds = String(o.delivery_status || o.status || "").toLowerCase();
            if (!["new", "pending", "accepted", "delivering"].includes(ds)) return false;
            if (!o.driver_id) return true;
            return meUser && String(o.driver_id) === String(meUser.id);
          });

          var pendingCount = visible.filter(function (o) {
            var ds = String(o.delivery_status || o.status || "").toLowerCase();
            return (ds === "pending" || ds === "new") && !o.driver_id;
          }).length;

          if (pendingCount > lastPendingCount) {
            playNewOrderSound();
            notifyBrowserNewOrder(pendingCount);
          }
          lastPendingCount = pendingCount;

          activeOrderIds = visible
            .filter(function (o) {
              var ds = String(o.delivery_status || o.status || "").toLowerCase();
              return (
                o.driver_id &&
                meUser &&
                String(o.driver_id) === String(meUser.id) &&
                (ds === "accepted" || ds === "delivering")
              );
            })
            .map(function (o) {
              return o.id;
            });

          renderOrders(visible);
        } catch (e) {
          showMsg(e.message || "تعذّر تحميل الطلبات");
        }
      }

      async function init() {
        if (!token) {
          document.body.innerHTML =
            '<div style="text-align:center;margin-top:50px;font-family:Cairo,sans-serif">' +
            "<h2>الرجاء تسجيل الدخول كمندوب</h2>" +
            '<a href="/driver-login">تسجيل الدخول</a>' +
            "</div>";
          return;
        }

        try {
          var me = await window.PlatformAPI.api("/api/core/me");
          meUser = me.user || {};
          var role = me.profile && me.profile.role;
          if (role !== "driver" && role !== "admin") {
            showMsg("هذه الصفحة مخصصة للمندوبين.");
            return;
          }
          var phone = meUser.phone || (me.profile && me.profile.name) || meUser.id || "—";
          document.getElementById("phoneLine").textContent = phone;

          await loadOrders();
          pollTimer = setInterval(loadOrders, 6000);
          startLocationLoop();
          sendLocationToActiveOrders();
        } catch (e) {
          showMsg(e.message || "فشل التحقق من الحساب");
        }
      }

      document.getElementById("refreshBtn").addEventListener("click", function () {
        try {
          var snd = document.getElementById("newOrderSound");
          if (snd) {
            snd.currentTime = 0;
            snd.play().catch(function () {});
          }
        } catch (e) {}
        loadOrders();
      });

      document.getElementById("logoutBtn").onclick = function (e) {
        e.preventDefault();
        if (pollTimer) clearInterval(pollTimer);
        stopLocationLoop();
        try {
          localStorage.removeItem("userPhone");
        } catch (err) {}
        window.PlatformAPI.setToken("");
        location.href = "/driver-login";
      };

      init();
    </script>
  </body>
</html>
