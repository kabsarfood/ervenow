<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ERVENOW | المندوب</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/assets/styles.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  </head>
  <body>
    <div class="layout">
      <div class="top-nav">
        <h1 style="margin: 0">مندوب التوصيل</h1>
        <div class="btn-row">
          <a class="btn btn-ghost" href="/orders">طلبات المنصة</a>
          <a class="btn btn-ghost" href="/driver-wallet">المحفظة</a>
          <a class="btn btn-ghost" href="/track">تتبع</a>
          <a class="btn btn-ghost" href="/login" id="driverLogout">خروج</a>
        </div>
      </div>
      <p class="sub" id="who"></p>
      <p class="sub" id="driverRatingLine" style="margin-top: 6px" translate="no">—</p>

      <div class="card" id="walletCard">
        <div class="badge">المحفظة</div>
        <p class="sub">تم نقل المحفظة إلى صفحة مستقلة لأداء أفضل وسحب آمن عبر OTP.</p>
        <div class="btn-row" style="margin-top: 10px">
          <a class="btn btn-primary" href="/driver-wallet">فتح صفحة المحفظة</a>
        </div>
      </div>

      <div class="card">
        <div class="badge">الطلبات</div>
        <div id="orders"></div>
        <button type="button" class="btn btn-primary" id="btnRefresh">تحديث</button>
      </div>

      <div class="card">
        <div class="badge">الموقع (GPS — طلب مُستلَم أو جاري التوصيل)</div>
        <p class="sub" style="margin-top: 8px" id="locStatus">—</p>
        <div id="driverLiveMap" style="min-height: 280px; border-radius: 12px; border: 1px solid rgba(0,0,0,.12); margin-top: 10px"></div>
      </div>

      <div class="msg err" id="err" style="display: none"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="/assets/api-config.js"></script>
    <script src="/assets/api.js"></script>
    <script>
      var token = window.PlatformAPI.getToken();
      var isLoggedIn = !!token;
      if (!token) {
        document.body.innerHTML =
          '<div style="text-align:center;margin-top:50px;">' +
          "<h2>🔒 الرجاء تسجيل الدخول كمندوب</h2>" +
          '<a href="/driver-login">تسجيل الدخول</a>' +
          "</div>";
        throw new Error("auth");
      }

      var locStatus = document.getElementById("locStatus");
      var activeOrderId = null;
      var isWatching = false;
      var locWatchId = null;
      var locTimer = null;
      var myUserId = null;
      var pollTimer = null;
      var knownOrders = [];
      var lastLat = null;
      var lastLng = null;
      var lastSentAt = 0;
      var sendingLocation = false;
      var sendingGpsError = false;
      var presenceTimer = null;
      var map = null;
      var driverMarker = null;
      var pickupMarker = null;
      var dropMarker = null;
      var routeLine = null;
      var lastRouteKey = "";
      var layerSatellite = null;
      var layerTerrain = null;

      function initDriverMap() {
        if (map || typeof L === "undefined") return;
        map = L.map("driverLiveMap").setView([24.7136, 46.6753], 12);
        layerSatellite = L.tileLayer(
          "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",
          {
            attribution: "Tiles &copy; Esri",
            maxZoom: 19,
          }
        );
        layerTerrain = L.tileLayer("https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png", {
          attribution: "&copy; OpenStreetMap contributors, SRTM | OpenTopoMap",
          maxZoom: 17,
        });
        layerSatellite.addTo(map);
        L.control.layers(
          {
            "أقمار صناعية": layerSatellite,
            "تضاريس": layerTerrain,
          },
          null,
          { position: "topright" }
        ).addTo(map);
      }

      function updateDriverMarker(lat, lng) {
        initDriverMap();
        if (!map) return;
        var la = Number(lat);
        var ln = Number(lng);
        if (!Number.isFinite(la) || !Number.isFinite(ln)) return;
        if (!driverMarker) {
          driverMarker = L.marker([la, ln], { title: "موقع المندوب" }).addTo(map).bindPopup("📍 موقعك الحالي");
        } else {
          driverMarker.setLatLng([la, ln]);
        }
        map.setView([la, ln], Math.max(14, map.getZoom()), { animate: true });
      }

      function clearOrderEndpoints() {
        if (!map) return;
        if (pickupMarker) {
          map.removeLayer(pickupMarker);
          pickupMarker = null;
        }
        if (dropMarker) {
          map.removeLayer(dropMarker);
          dropMarker = null;
        }
        if (routeLine) {
          map.removeLayer(routeLine);
          routeLine = null;
        }
        lastRouteKey = "";
      }

      function endpointIcon(label, bg) {
        return L.divIcon({
          className: "driver-endpoint-icon",
          html:
            '<div style="padding:4px 8px;border-radius:10px;background:' +
            bg +
            ';color:#fff;font-weight:800;font-size:12px;white-space:nowrap;">' +
            label +
            "</div>",
          iconSize: [72, 24],
          iconAnchor: [36, 12],
        });
      }

      function updateOrderEndpoints(order) {
        initDriverMap();
        if (!map || !order) return;
        var pLat = Number(order.pickup_lat);
        var pLng = Number(order.pickup_lng);
        var dLat = Number(order.drop_lat);
        var dLng = Number(order.drop_lng);

        if (Number.isFinite(pLat) && Number.isFinite(pLng)) {
          if (!pickupMarker) {
            pickupMarker = L.marker([pLat, pLng], {
              title: "بداية",
              icon: endpointIcon("بداية", "#0f766e"),
            })
              .addTo(map)
              .bindPopup("🟢 بداية التوصيل (الاستلام)");
          } else {
            pickupMarker.setLatLng([pLat, pLng]);
          }
        }

        if (Number.isFinite(dLat) && Number.isFinite(dLng)) {
          if (!dropMarker) {
            dropMarker = L.marker([dLat, dLng], {
              title: "نهاية",
              icon: endpointIcon("نهاية", "#b91c1c"),
            })
              .addTo(map)
              .bindPopup("🔴 نهاية التوصيل (التسليم)");
          } else {
            dropMarker.setLatLng([dLat, dLng]);
          }
        }
      }

      async function getRoute(a, b) {
        var url =
          "https://router.project-osrm.org/route/v1/driving/" +
          a.lng +
          "," +
          a.lat +
          ";" +
          b.lng +
          "," +
          b.lat +
          "?overview=full&geometries=geojson";
        var r = await fetch(url);
        var j = await r.json();
        if (!j.routes || !j.routes[0]) throw new Error("تعذر حساب المسار");
        return j.routes[0];
      }

      async function updateRouteLine(order) {
        initDriverMap();
        if (!map || !order) return;
        var pLat = Number(order.pickup_lat);
        var pLng = Number(order.pickup_lng);
        var dLat = Number(order.drop_lat);
        var dLng = Number(order.drop_lng);
        if (!Number.isFinite(pLat) || !Number.isFinite(pLng) || !Number.isFinite(dLat) || !Number.isFinite(dLng)) {
          if (routeLine) {
            map.removeLayer(routeLine);
            routeLine = null;
          }
          lastRouteKey = "";
          return;
        }

        var routeKey = [pLat.toFixed(6), pLng.toFixed(6), dLat.toFixed(6), dLng.toFixed(6)].join("|");
        if (routeLine && lastRouteKey === routeKey) return;
        try {
          var route = await getRoute({ lat: pLat, lng: pLng }, { lat: dLat, lng: dLng });
          if (routeLine) map.removeLayer(routeLine);
          routeLine = L.geoJSON(route.geometry, {
            style: { color: "#2563eb", weight: 4, opacity: 0.85 },
          }).addTo(map);
          lastRouteKey = routeKey;
          if (pickupMarker && dropMarker) {
            var group = L.featureGroup([pickupMarker, dropMarker, routeLine]);
            map.fitBounds(group.getBounds(), { padding: [24, 24] });
          }
        } catch (e) {}
      }

      function shouldSend(lat, lng) {
        var now = Date.now();

        if (lastLat == null || lastLng == null) return true;

        var moved = Math.abs(lat - lastLat) + Math.abs(lng - lastLng) > 0.00005;

        var timePassed = now - lastSentAt > 5000;

        return moved || timePassed;
      }

      async function sendLocation(lat, lng, explicitOrderId) {
        if (sendingLocation) return;
        var orderId = explicitOrderId != null ? explicitOrderId : activeOrderId;
        sendingLocation = true;
        try {
          var body = { lat: lat, lng: lng };
          if (orderId) body.order_id = orderId;
          await window.PlatformAPI.api("/api/driver/update-location", {
            method: "POST",
            body: body,
          });
          updateDriverMarker(lat, lng);
          lastLat = lat;
          lastLng = lng;
          lastSentAt = Date.now();
          if (activeOrderId) {
            document.getElementById("locStatus").textContent = "آخر إرسال: " + new Date().toLocaleTimeString("ar-SA");
          } else {
            document.getElementById("locStatus").textContent = "تم تحديث موقعك للمنصة: " + new Date().toLocaleTimeString("ar-SA");
          }
        } catch (e) {
          document.getElementById("locStatus").textContent = "خطأ إرسال الموقع: " + (e.message || e);
        } finally {
          sendingLocation = false;
        }
      }

      function onGeoError(err) {
        console.log("GPS error:", err && err.message);
        // لا ترسل موقعاً وهمياً — فقط حدّث الحالة و(اختيارياً) نبّه الخادم دون تغيير last known lat/lng
        locStatus.innerText = "⚠️ تعذّر تحديد الموقع — حاول تفعيل GPS";
        if (activeOrderId) {
          void (async function () {
            if (sendingGpsError) return;
            sendingGpsError = true;
            try {
              await window.PlatformAPI.api(
                "/api/delivery/orders/" + encodeURIComponent(activeOrderId) + "/location",
                { method: "POST", body: { gps_error: true } }
              );
            } catch (e) {
              console.log("report gps_error:", e && e.message);
            } finally {
              sendingGpsError = false;
            }
          })();
        }
        setTimeout(function () {
          startLocationLoop();
        }, 5000);
      }

      function err(m) {
        var e = document.getElementById("err");
        e.style.display = "block";
        e.textContent = m;
      }

      function showSuccess(msg) {
        var el = document.createElement("div");
        el.innerText = msg;
        el.style.position = "fixed";
        el.style.bottom = "20px";
        el.style.right = "20px";
        el.style.background = "green";
        el.style.color = "#fff";
        el.style.padding = "10px";
        el.style.borderRadius = "8px";
        el.style.zIndex = "9999";
        document.body.appendChild(el);
        setTimeout(function () {
          el.remove();
        }, 2500);
      }

      function showError(msg) {
        var el = document.createElement("div");
        el.innerText = msg;
        el.style.position = "fixed";
        el.style.bottom = "20px";
        el.style.right = "20px";
        el.style.background = "red";
        el.style.color = "#fff";
        el.style.padding = "10px";
        el.style.borderRadius = "8px";
        el.style.zIndex = "9999";
        document.body.appendChild(el);
        setTimeout(function () {
          el.remove();
        }, 2500);
      }

      async function loadMe() {
        var j = await window.PlatformAPI.api("/api/core/me");
        if (j.user && j.user.id) myUserId = String(j.user.id);
        document.getElementById("who").textContent =
          "الدور: " + (j.profile && j.profile.role) + " — " + (j.user && j.user.phone);
        if (j.profile && j.profile.role !== "driver") {
          err("هذه الصفحة للمندوبين. من صفحة الدخول اختر «مندوب» ثم سجّل الدخول.");
        }
      }

      function renderStars(avg) {
        var a = Math.max(0, Math.min(5, Number(avg) || 0));
        var full = Math.floor(a);
        var half = a % 1 >= 0.5 && full < 5;
        var stars = "⭐".repeat(full);
        if (half) stars += "☆";
        var used = full + (half ? 1 : 0);
        stars += "✩".repeat(5 - used);
        return stars;
      }

      async function loadDriverRating() {
        var el = document.getElementById("driverRatingLine");
        if (!el) return;
        try {
          var j = await window.PlatformAPI.api("/api/driver/rating");
          var c = j.count != null ? j.count : 0;
          if (!c || j.avg == null) {
            el.textContent = "لا توجد تقييمات بعد";
            return;
          }
          var avgNum = Number(j.avg);
          var avgStr = Number.isFinite(avgNum) ? avgNum.toFixed(1) : String(j.avg);
          el.innerText = renderStars(avgNum) + "\n" + avgStr + " من 5 (" + c + " تقييم)";
        } catch (e) {
          el.textContent = "—";
        }
      }

      var STATUS_AR = {
        new: "جديد — بانتظار مندوب",
        pending: "في الانتظار",
        accepted: "تم استلام الطلب",
        delivering: "جاري التوصيل",
        delivered: "تم التسليم",
      };

      async function loadOrders() {
        var j = await window.PlatformAPI.api("/api/driver/orders");
        var box = document.getElementById("orders");
        box.innerHTML = "";
        var orders = j.orders || [];
        var ids = orders.map(function (o) {
          return o.id;
        });
        var newOrders = ids.filter(function (id) {
          return knownOrders.indexOf(id) === -1;
        });
        if (newOrders.length) {
          try {
            new Audio("/sound.mp3").play();
          } catch (e) {}
        }
        knownOrders = ids;
        orders.forEach(function (o) {
          var div = document.createElement("div");
          div.className = "order-row";
          var actions = document.createElement("div");
          actions.className = "btn-row";
          actions.style.marginTop = "8px";
          var deliveryStatus = o.delivery_status || o.status;
          var st = STATUS_AR[deliveryStatus] || deliveryStatus;
          var num = (o.order_number && String(o.order_number).trim()) || o.id.slice(0, 8) + "…";
          var src = (o.series_source && String(o.series_source)) || "";
          var isKabsar = /kabsar/i.test(src);
          var sourceTag = isKabsar ? "🍛 كبسار" : "🌐 المنصة";
          var extLine =
            o.external_order_id != null && String(o.external_order_id) !== ""
              ? " — " + o.external_order_id
              : "";
          var phone = isLoggedIn ? (o.customer_phone || "—") : "**********";
          div.innerHTML =
            "<strong><span class=\"ord-no\" translate=\"no\">" +
            num +
            "</span></strong> <span class=\"badge\" style=\"margin-inline-start:6px\">" +
            st +
            "</span><br/><div class=\"sub order-source\" style=\"margin:4px 0 2px; font-size:0.9rem\" translate=\"no\">" +
            sourceTag +
            extLine +
            "</div><br/><small>" +
            (o.drop_address || "") +
            "</small><br/><small>هاتف زائر المنصة: " +
            phone +
            "</small><br/>";

          var trackA = document.createElement("a");
          trackA.className = "btn btn-ghost";
          trackA.href = "/track?id=" + encodeURIComponent(o.id);
          trackA.textContent = "تتبع على الخريطة";
          actions.appendChild(trackA);

          if (deliveryStatus === "new" || deliveryStatus === "pending") {
            var b = document.createElement("button");
            b.className = "btn btn-primary";
            b.textContent = "استلام الطلب";
            b.onclick = async function () {
              var oid = String(o.id != null ? o.id : "").trim();
              if (!oid) {
                err("معرّف الطلب مفقود");
                return;
              }
              try {
                var a = await window.PlatformAPI.api("/api/driver/accept/" + encodeURIComponent(oid), {
                  method: "POST",
                });
                if (!a.ok || a.accepted === false) {
                  showError((a && a.message) || "تم استلام الطلب من مندوب آخر");
                  return;
                }
                activeOrderId = oid;
                startLocationLoop();
                showSuccess("تم قبول الطلب");
                loadOrders();
              } catch (e) {
                err(e.message || String(e));
              }
            };
            actions.appendChild(b);
          }

          if (o.driver_id && deliveryStatus === "accepted") {
            var b2 = document.createElement("button");
            b2.className = "btn btn-ghost";
            b2.textContent = "بدء التوصيل";
            b2.onclick = async function () {
              await window.PlatformAPI.api("/api/delivery/orders/" + o.id + "/status", {
                method: "PATCH",
                body: { status: "delivering" },
              });
              activeOrderId = o.id;
              startLocationLoop();
              loadOrders();
            };
            actions.appendChild(b2);

            var b2done = document.createElement("button");
            b2done.className = "btn btn-primary";
            b2done.textContent = "تم التسليم";
            b2done.onclick = async function () {
              await window.PlatformAPI.api("/api/delivery/orders/" + o.id + "/status", {
                method: "PATCH",
                body: { status: "delivered" },
              });
              activeOrderId = null;
              stopLocationLoop();
              showSuccess("تم إنهاء رحلة التوصيل");
              loadOrders();
            };
            actions.appendChild(b2done);
          }

          if (o.driver_id && deliveryStatus === "delivering") {
            var b3 = document.createElement("button");
            b3.className = "btn btn-ghost";
            b3.textContent = "تم التسليم";
            b3.onclick = async function () {
              await window.PlatformAPI.api("/api/delivery/orders/" + o.id + "/status", {
                method: "PATCH",
                body: { status: "delivered" },
              });
              activeOrderId = null;
              stopLocationLoop();
              showSuccess("تم إنهاء رحلة التوصيل");
              loadOrders();
            };
            actions.appendChild(b3);
          }

          div.appendChild(actions);
          box.appendChild(div);
        });

        var trackOrder =
          orders.find(function (x) {
            return (
              (x.delivery_status || x.status) === "delivering" &&
              myUserId &&
              x.driver_id &&
              String(x.driver_id) === myUserId
            );
          }) ||
          orders.find(function (x) {
            return (
              (x.delivery_status || x.status) === "accepted" &&
              myUserId &&
              x.driver_id &&
              String(x.driver_id) === myUserId
            );
          });
        if (trackOrder) {
          updateOrderEndpoints(trackOrder);
          void updateRouteLine(trackOrder);
          if (String(activeOrderId) !== String(trackOrder.id)) {
            stopLocationLoop();
            activeOrderId = trackOrder.id;
            startLocationLoop();
          } else if (!isWatching) {
            startLocationLoop();
          }
        } else {
          clearOrderEndpoints();
          activeOrderId = null;
          stopLocationLoop();
        }
        void loadDriverRating();
      }

      function stopLocationLoop() {
        if (locTimer != null) {
          clearInterval(locTimer);
          locTimer = null;
        }
        if (locWatchId != null) navigator.geolocation.clearWatch(locWatchId);
        locWatchId = null;
        isWatching = false;
        lastLat = null;
        lastLng = null;
        lastSentAt = 0;
        document.getElementById("locStatus").textContent = "لا يوجد طلب مُستلَم. موقعك ما زال يُحدَّث للمنصة.";
      }

      function startLocationLoop() {
        if (isWatching) return;
        if (!activeOrderId) return;
        isWatching = true;
        lastLat = null;
        lastLng = null;
        lastSentAt = 0;

        locTimer = setInterval(function () {
          if (!activeOrderId) return;
          navigator.geolocation.getCurrentPosition(
            async function (pos) {
              var lat = pos.coords.latitude;
              var lng = pos.coords.longitude;
              if (!shouldSend(lat, lng)) return;
              await sendLocation(lat, lng);
            },
            onGeoError,
            { enableHighAccuracy: false, maximumAge: 5000, timeout: 10000 }
          );
        }, 5000);
        navigator.geolocation.getCurrentPosition(
          async function (pos) {
            var lat = pos.coords.latitude;
            var lng = pos.coords.longitude;
            await sendLocation(lat, lng);
          },
          onGeoError,
          { enableHighAccuracy: false, maximumAge: 5000, timeout: 10000 }
        );
        document.getElementById("locStatus").textContent = "جارٍ تتبّع الموقع…";
      }

      function startPresenceLocationLoop() {
        if (presenceTimer != null) return;
        presenceTimer = setInterval(function () {
          navigator.geolocation.getCurrentPosition(
            async function (pos) {
              var lat = pos.coords.latitude;
              var lng = pos.coords.longitude;
              await sendLocation(lat, lng, null);
            },
            function () {},
            { enableHighAccuracy: false, maximumAge: 10000, timeout: 12000 }
          );
        }, 15000);
        navigator.geolocation.getCurrentPosition(
          async function (pos) {
            await sendLocation(pos.coords.latitude, pos.coords.longitude, null);
          },
          function () {},
          { enableHighAccuracy: false, maximumAge: 10000, timeout: 12000 }
        );
      }

      document.getElementById("btnRefresh").onclick = function () {
        loadOrders();
      };

      document.getElementById("driverLogout").onclick = function (e) {
        e.preventDefault();
        if (pollTimer) clearInterval(pollTimer);
        stopLocationLoop();
        window.PlatformAPI.setToken("");
        location.href = "/login";
      };

      (async function () {
        initDriverMap();
        await loadMe();
        await loadOrders();
        pollTimer = setInterval(loadOrders, 8000);
        startPresenceLocationLoop();
      })();
    </script>
  </body>
</html>
