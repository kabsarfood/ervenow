<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ERVENOW | السلة</title>
    <link rel="stylesheet" href="/assets/styles.css" />
    <style>
      .cart-grid {
        display: grid;
        grid-template-columns: 2fr 1fr;
        gap: 14px;
      }
      .cart-items .cart-item {
        border: 1px solid rgba(0, 0, 0, 0.08);
        border-radius: 12px;
        padding: 12px;
        margin-bottom: 10px;
        background: #fff;
      }
      .cart-item h4 {
        margin: 0 0 6px;
      }
      .cart-meta {
        font-size: 0.9rem;
        color: #555;
        line-height: 1.7;
      }
      .cart-total {
        font-size: 1.1rem;
        font-weight: 800;
      }
      @media (max-width: 860px) {
        .cart-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <div class="top-nav">
        <h2 style="margin: 0">🛒 السلة</h2>
        <div class="btn-row">
          <a class="btn btn-ghost" href="/">الرئيسية</a>
          <a class="btn btn-ghost" href="/browse">التصفح</a>
        </div>
      </div>

      <div class="card" id="guestCartBanner" style="display: none; margin-bottom: 12px; background: #fff8ee; border-color: #e8d4bc">
        <p class="sub" style="margin: 0">
          لإتمام الطلب سجّل <strong>اسمك</strong> وجوالك ورمز واتساب — دون انتظار موافقة.
          <a href="/login?mode=register&amp;role=customer&amp;next=%2Fcart" style="font-weight: 800; color: #5b371d">تسجيل الآن</a>
        </p>
      </div>

      <div class="cart-grid">
        <div class="card cart-items">
          <div id="cartList"></div>
        </div>
        <div class="card">
          <div class="badge">ملخص السلة</div>
          <p class="sub" id="cartItemsCount" style="margin-top: 10px">عدد العناصر: 0</p>
          <p class="cart-total" id="cartTotal">الإجمالي: 0.00 ريال</p>
          <div class="btn-row" style="margin-top: 10px; flex-direction: column; align-items: stretch">
            <button class="btn btn-primary" type="button" id="checkoutBtn" onclick="checkout()">إتمام الطلب</button>
            <button class="btn btn-ghost" type="button" id="clearBtn" onclick="clearAllCart()">تفريغ السلة</button>
            <a class="btn btn-ghost" href="/browse">إضافة خدمات أخرى</a>
          </div>
        </div>
      </div>

      <div class="card" id="storeDeliveryCard" style="display: none; margin-top: 12px">
        <div class="badge">موقع التوصيل (طلبات المتاجر)</div>
        <p class="sub">
          نحتاج موقعك لحساب المسافة (<strong>أجرة التوصيل = كم × 2.3 ريال تقريباً</strong>) والتأكد أن المتجر يغطي منطقتك.
        </p>
        <label for="customer_address">عنوان التوصيل (نصّي)</label>
        <textarea id="customer_address" rows="2" placeholder="الحي، الشارع، رقم الوحدة…"></textarea>
        <button type="button" class="btn btn-ghost" id="btnGeo" style="margin-top: 10px">تحديد موقعي GPS</button>
        <p class="sub" id="geoStatus" style="margin-top: 8px"></p>
      </div>
    </div>

    <script src="/assets/guestBrowse.js"></script>
    <script src="/assets/api.js"></script>
    <script src="/assets/cart.js"></script>
    <script>
      function refreshGuestCartBanner() {
        var b = document.getElementById("guestCartBanner");
        if (!b || !window.ErvenowGuestBrowse) return;
        var tok =
          (window.PlatformAPI && PlatformAPI.getToken && PlatformAPI.getToken()) ||
          localStorage.getItem("token") ||
          "";
        b.style.display = !tok && ErvenowGuestBrowse.isActive() ? "block" : "none";
      }

      var pendingGeo = { lat: null, lng: null };

      function cartNeedsStoreGeo(cart) {
        return (cart || []).some(function (i) {
          return i && i.data && i.data.store_id;
        });
      }

      function refreshStoreDeliveryCard() {
        var cart = getCart();
        var el = document.getElementById("storeDeliveryCard");
        var geoEl = document.getElementById("geoStatus");
        if (!el) return;
        var need = cartNeedsStoreGeo(cart);
        el.style.display = need ? "block" : "none";
        if (!need) {
          pendingGeo.lat = null;
          pendingGeo.lng = null;
          if (geoEl) geoEl.textContent = "";
        }
      }

      document.getElementById("btnGeo").onclick = function () {
        var st = document.getElementById("geoStatus");
        if (!navigator.geolocation) {
          if (st) st.textContent = "المتصفح لا يدعم الموقع.";
          return;
        }
        if (st) st.textContent = "جاري تحديد الموقع…";
        navigator.geolocation.getCurrentPosition(
          function (p) {
            pendingGeo.lat = p.coords.latitude;
            pendingGeo.lng = p.coords.longitude;
            if (st) st.textContent = "تم حفظ موقع التوصيل.";
          },
          function () {
            if (st) st.textContent = "تعذر الوصول للموقع — تأكد من الإذن.";
          },
          { enableHighAccuracy: false, timeout: 12000, maximumAge: 0 }
        );
      };

      function renderCart() {
        const cart = getCart();
        const el = document.getElementById("cartList");
        const countEl = document.getElementById("cartItemsCount");
        const totalEl = document.getElementById("cartTotal");
        if (!el) return;

        if (!cart.length) {
          el.innerHTML = "<p>السلة فارغة حالياً</p>";
          if (countEl) countEl.innerText = "عدد العناصر: 0";
          if (totalEl) totalEl.innerText = "الإجمالي: 0.00 ريال";
          refreshGuestCartBanner();
          refreshStoreDeliveryCard();
          return;
        }

        const total = cart.reduce(function (sum, item) {
          return sum + (Number(item.price) || 0);
        }, 0);
        if (countEl) countEl.innerText = "عدد العناصر: " + cart.length;
        if (totalEl) totalEl.innerText = "الإجمالي: " + total.toFixed(2) + " ريال";

        el.innerHTML = cart
          .map(function (item) {
            var data = item.data || {};
            var hidePhones = window.ErvenowGuestBrowse && ErvenowGuestBrowse.isAnonymousGuest();
            var districtShown = hidePhones ? "—" : data.district || "—";
            var locShown = hidePhones ? "—" : data.location || "—";
            return (
              "<div class='cart-item'>" +
              "<h4>" +
              (item.title || "طلب") +
              "</h4>" +
              "<div class='cart-meta'>" +
              "<div>" +
              (item.type || "general") +
              "</div>" +
              "<div>الحي: " +
              districtShown +
              "</div>" +
              "<div>الموقع: " +
              locShown +
              "</div>" +
              "<div>الكمية: " +
              (data.qty || 1) +
              "</div>" +
              "<div>السعر: " +
              (Number(item.price) || 0) +
              " ريال</div>" +
              "</div>" +
              "<div class='btn-row' style='margin-top:8px'>" +
              "<button class='btn btn-ghost' type='button' onclick='removeItem(\"" +
              item.id +
              "\")'>حذف</button>" +
              "</div>" +
              "</div>"
            );
          })
          .join("");
        refreshGuestCartBanner();
        refreshStoreDeliveryCard();
      }

      function removeItem(id) {
        removeFromCart(id);
        renderCart();
        showSuccess("تم حذف العنصر من السلة");
      }

      function clearAllCart() {
        localStorage.removeItem("cart");
        updateCartCount();
        renderCart();
        showSuccess("تم تفريغ السلة");
      }

      const checkout = safeClick(async function () {
        const cart = getCart();
        if (!cart.length) {
          showError("السلة فارغة");
          return;
        }

        const btn = document.getElementById("checkoutBtn");
        const token =
          (window.PlatformAPI && typeof window.PlatformAPI.getToken === "function" && window.PlatformAPI.getToken()) ||
          localStorage.getItem("token") ||
          "";

        if (!token || !String(token).trim()) {
          window.location.href =
            "/login?mode=register&role=customer&next=" + encodeURIComponent("/cart");
          return;
        }

        if (btn) {
          btn.disabled = true;
          btn.innerText = "جارٍ الإرسال...";
        }

        try {
          var payload = { items: cart };
          if (cartNeedsStoreGeo(cart)) {
            if (pendingGeo.lat == null || pendingGeo.lng == null) {
              showError("اضغط «تحديد موقعي GPS» لإتمام طلب المتجر والتحقق من نطاق التوصيل");
              return;
            }
            payload.customer_lat = pendingGeo.lat;
            payload.customer_lng = pendingGeo.lng;
            payload.customer_address =
              (document.getElementById("customer_address") && document.getElementById("customer_address").value.trim()) ||
              "";
          }

          const res = await fetch("/api/checkout", {
            method: "POST",
            headers: Object.assign(
              { "Content-Type": "application/json" },
              { Authorization: "Bearer " + token }
            ),
            body: JSON.stringify(payload),
          });
          const data = await res.json().catch(function () {
            return {};
          });

          if (res.status === 401) {
            window.location.href =
              "/login?mode=register&role=customer&next=" + encodeURIComponent("/cart");
            return;
          }

          if (!res.ok || !data.ok) {
            throw new Error(data.message || data.error || "checkout failed");
          }

          showSuccess("تم إنشاء " + ((data.orders && data.orders.length) || 0) + " طلب");
          localStorage.removeItem("cart");
          updateCartCount();
          renderCart();
        } catch (e) {
          showError(String((e && e.message) || "حدث خطأ، حاول مرة أخرى"));
          return;
        } finally {
          if (btn) {
            btn.disabled = false;
            btn.innerText = "إتمام الطلب";
          }
        }
      });
      window.checkout = checkout;

      renderCart();
    </script>
  </body>
</html>
