<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ERVENOW | تسجيل الدخول</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/assets/styles.css" />
    <style>
      .input-readonly {
        background: #f0ebe3;
        cursor: default;
        font-weight: 700;
        letter-spacing: 0.06em;
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <p><a href="/">← الرئيسية</a></p>
      <h1 id="authTitle">تسجيل الدخول — ERVENOW</h1>
      <p class="sub" id="authSubtitle">
        أدخل رقم جوال سعودي <strong>يبدأ بـ 05</strong> (مثال 05XXXXXXXX). رمز الدخول الموحّد:
        <strong>12345</strong>
      </p>

      <div class="card">
        <label for="role">نوع الحساب</label>
        <select id="role">
          <option value="customer">عميل</option>
          <option value="driver">مندوب</option>
          <option value="restaurant">مطعم</option>
          <option value="merchant">تاجر (متجر)</option>
          <option value="service">مقدّم خدمة</option>
          <option value="admin">مسؤول (تجربة)</option>
        </select>

        <label for="phone">رقم الجوال (05…)</label>
        <input
          id="phone"
          type="tel"
          inputmode="numeric"
          placeholder="05xxxxxxxx"
          value="0505745650"
          maxlength="10"
          autocomplete="tel-national"
        />

        <label for="otp" style="margin-top: 16px">رمز الدخول</label>
        <input id="otp" type="text" inputmode="numeric" value="12345" readonly class="input-readonly" />

        <button type="button" class="btn btn-primary" id="btnVerify">تسجيل الدخول</button>

        <div class="msg" id="msg" style="display: none"></div>
      </div>
    </div>

    <script src="/assets/api.js"></script>
    <script>
      var LOGIN_CODE = "12345";

      function toE164(v) {
        var d = String(v || "").replace(/\D/g, "");
        if (d.startsWith("9665") && d.length === 12) return "+" + d;
        if (d.startsWith("05") && d.length === 10) return "+966" + d.slice(1);
        return null;
      }

      function isValid05(v) {
        var p = toE164(v);
        if (!p) return false;
        var d = p.replace(/\D/g, "");
        return /^9665\d{8}$/.test(d);
      }

      function show(text, isOk) {
        var el = document.getElementById("msg");
        el.style.display = "block";
        el.className = "msg " + (isOk ? "ok" : "err");
        el.textContent = text;
      }

      function normalizeInputPhone() {
        var el = document.getElementById("phone");
        var d = String(el.value || "").replace(/\D/g, "");
        if (d.startsWith("9665")) d = "0" + d.slice(3);
        else if (d.startsWith("5") && d.length === 9) d = "0" + d;
        if (d.length > 10) d = d.slice(0, 10);
        el.value = d;
        return d;
      }

      document.getElementById("phone").addEventListener("input", normalizeInputPhone);
      document.getElementById("phone").addEventListener("blur", normalizeInputPhone);

      (function preselectRole() {
        var qs = new URLSearchParams(window.location.search);
        var mode = qs.get("mode");
        var r = qs.get("role");
        if (mode === "register") {
          var t = document.getElementById("authTitle");
          var s = document.getElementById("authSubtitle");
          var b = document.getElementById("btnVerify");
          if (t) t.textContent = "إنشاء حساب — ERVENOW";
          if (s) {
            s.innerHTML =
              'أدخل رقم جوال سعودي <strong>يبدأ بـ 05</strong> (مثال 05XXXXXXXX). سيتم إنشاء حسابك مباشرة برمز الدخول الموحّد: <strong>12345</strong>';
          }
          if (b) b.textContent = "إنشاء حساب";
          if (!r) r = "customer";
        }
        if (r) {
          var sel = document.getElementById("role");
          if (sel) sel.value = r;
        }
      })();

      document.getElementById("btnVerify").onclick = async function () {
        try {
          normalizeInputPhone();
          var raw = document.getElementById("phone").value;
          if (!isValid05(raw)) {
            return show("أدخل رقم سعودي يبدأ بـ 05 (10 أرقام مثال 05xxxxxxxx)", false);
          }
          var phone = toE164(raw);
          var code = String(document.getElementById("otp").value).trim() || LOGIN_CODE;
          if (!phone) return show("أدخل الرقم", false);

          var role = document.getElementById("role").value;
          var res = await window.PlatformAPI.api("/api/core/verify-otp", {
            method: "POST",
            body: { phone: phone, code: code, role: role },
          });

          if (res.ok === false || res.success === false) {
            show("فشل التحقق", false);
            return;
          }
          var token = res.token;
          if (!token) {
            show("فشل التحقق", false);
            return;
          }

          try {
            localStorage.setItem("token", token);
            if (res.user && res.user.id) localStorage.setItem("userId", res.user.id);
          } catch (lsErr) {
            console.warn("localStorage token:", lsErr);
          }
          window.PlatformAPI.setToken(token);

          var target = role === "driver" ? "/driver" : "/dashboard";
          show("نجاح تسجيل الدخول. تحويل…", true);

          try {
            window.location.href = target;
          } catch (navErr) {
            console.error(navErr);
            alert("تم التحقق لكن لم يتم التحويل");
            return;
          }

          setTimeout(function () {
            if (window.location.pathname !== target) {
              alert("تم التحقق لكن لم يتم التحويل — افتح يدوياً: " + target);
            }
          }, 1500);
        } catch (e) {
          show(String(e.message || e), false);
        }
      };
    </script>
  </body>
</html>
