<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ERWENOW | تسجيل الدخول</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body>
    <div class="layout">
      <p><a href="/">← الرئيسية</a></p>
      <h1>تسجيل الدخول (OTP)</h1>
      <p class="sub">رمز التحقق يُرسل عبر واتساب (Twilio). في وضع التطوير قد يُعرض الرمز في الاستجابة عند تفعيل ALLOW_DEV_OTP.</p>

      <div class="card">
        <label for="role">نوع الحساب</label>
        <select id="role">
          <option value="customer">عميل</option>
          <option value="driver">مندوب</option>
          <option value="restaurant">مطعم</option>
          <option value="merchant">تاجر (متجر)</option>
          <option value="service">مقدّم خدمة</option>
          <option value="admin">مسؤول (تجربة)</option>
        </select>

        <label for="phone">رقم الجوال</label>
        <input id="phone" type="tel" inputmode="tel" placeholder="05xxxxxxxx" value="0505745650" />

        <button type="button" class="btn btn-primary" id="btnSend">إرسال الكود</button>

        <label for="otp" style="margin-top: 16px">رمز التحقق</label>
        <input id="otp" type="text" inputmode="numeric" autocomplete="one-time-code" placeholder="الرمز" />

        <button type="button" class="btn btn-primary" id="btnVerify">تسجيل الدخول</button>

        <div class="msg" id="msg" style="display: none"></div>
      </div>
    </div>

    <script src="/assets/api.js"></script>
    <script>
      function toE164(v) {
        var d = String(v || "").replace(/\D/g, "");
        if (d.startsWith("966")) return "+" + d;
        if (d.startsWith("05")) return "+966" + d.slice(1);
        if (d.startsWith("5") && d.length === 9) return "+966" + d;
        return null;
      }

      function show(text, isOk) {
        var el = document.getElementById("msg");
        el.style.display = "block";
        el.className = "msg " + (isOk ? "ok" : "err");
        el.textContent = text;
      }

      document.getElementById("btnSend").onclick = async function () {
        try {
          var phone = toE164(document.getElementById("phone").value);
          if (!phone) return show("رقم غير صالح", false);
          document.getElementById("phone").value = phone;
          var j = await window.PlatformAPI.api("/api/core/send-otp", {
            method: "POST",
            body: { phone: phone },
          });
          var extra = j.devOtp ? " (تجربة: " + j.devOtp + ")" : "";
          show((j.message || "تم إرسال الكود") + extra, true);
        } catch (e) {
          show(String(e.message || e), false);
        }
      };

      document.getElementById("btnVerify").onclick = async function () {
        try {
          var phone = toE164(document.getElementById("phone").value);
          var code = document.getElementById("otp").value.trim();
          if (!phone || !code) return show("أدخل الرقم والرمز", false);

          var role = document.getElementById("role").value;
          var res = await window.PlatformAPI.api("/api/core/verify-otp", {
            method: "POST",
            body: { phone: phone, code: code, role: role },
          });

          if (res.ok === false || res.success === false) {
            show("فشل التحقق", false);
            return;
          }
          var token = res.token;
          if (!token) {
            show("فشل التحقق", false);
            return;
          }

          try {
            localStorage.setItem("token", token);
          } catch (lsErr) {
            console.warn("localStorage token:", lsErr);
          }
          window.PlatformAPI.setToken(token);

          console.log("OTP verified, redirecting...");

          var target = role === "driver" ? "/driver" : "/dashboard";
          show("نجاح تسجيل الدخول. تحويل…", true);

          try {
            window.location.href = target;
          } catch (navErr) {
            console.error(navErr);
            alert("تم التحقق لكن لم يتم التحويل");
            return;
          }

          setTimeout(function () {
            if (window.location.pathname !== target) {
              alert("تم التحقق لكن لم يتم التحويل — افتح يدوياً: " + target);
            }
          }, 1500);
        } catch (e) {
          show(String(e.message || e), false);
        }
      };
    </script>
  </body>
</html>
