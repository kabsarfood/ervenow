<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ابدأ الآن | ERVENOW</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <style>
      body {
        margin: 0;
        font-family: Cairo, sans-serif;
        background: #f8f4ef;
        color: #2b1f16;
      }
      .wrap {
        max-width: 980px;
        margin: 26px auto;
        padding: 14px;
      }
      h1 {
        margin: 0 0 6px;
        color: #5b371d;
      }
      p {
        margin: 0 0 14px;
        color: #6e5a4a;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
        gap: 10px;
      }
      .card {
        display: block;
        background: #fff;
        border: 1px solid #e5d8cb;
        border-radius: 12px;
        padding: 12px;
        text-decoration: none;
        color: #2b1f16;
        font-weight: 700;
      }
      .card:hover {
        background: #fffaf3;
      }
      .actions {
        margin-top: 16px;
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }
      .btn {
        padding: 9px 14px;
        border-radius: 10px;
        border: 1px solid #5b371d;
        text-decoration: none;
        color: #5b371d;
        background: #fff;
        font-weight: 700;
        cursor: pointer;
        font-family: inherit;
      }
      .btn-primary {
        background: #5b371d;
        color: #fff;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>اطلب أي خدمة الآن</h1>
      <p id="guestStartNote" style="display: none; margin: 0 0 14px; padding: 10px 12px; background: #fff8ee; border: 1px solid #e8d4bc; border-radius: 10px; color: #5b371d">
        وضع زائر: تصفّح العروض دون ظهور أسماء أو أرقام المحلات. لإتمام الطلب سجّل من صفحة التسجيل برمز واتساب.
      </p>

      <p>اختر الخدمة المناسبة:</p>

      <div class="grid">
        <a class="card" href="/browse?type=restaurant">🍛 مطعم</a>
        <a class="card" href="/browse?type=pharmacy">💊 صيدلية</a>
        <a class="card" href="/browse?type=plumber">🔧 خدمات</a>
        <a class="card" href="/dashboard">🚚 توصيل</a>
        <a class="card guest-only" href="/login">🔐 تسجيل دخول</a>
        <a class="card guest-only" href="/login?mode=register&role=customer">📝 إنشاء حساب</a>
      </div>

      <div class="actions">
        <button class="btn" type="button" id="btnBack">⬅ رجوع</button>
        <a class="btn btn-primary" href="/">🏠 الرئيسية</a>
      </div>
    </div>

    <script src="/assets/guestBrowse.js"></script>
    <script>
      (function () {
        var n = document.getElementById("guestStartNote");
        if (n && window.ErvenowGuestBrowse && ErvenowGuestBrowse.isAnonymousGuest()) n.style.display = "block";
      })();
    </script>

    <script>
      (function () {
        var hasToken = !!(
          localStorage.getItem("token") ||
          localStorage.getItem("ervenow_access_token") ||
          localStorage.getItem("erwenow_access_token")
        );
        if (hasToken) {
          document.querySelectorAll(".guest-only").forEach(function (el) {
            el.style.display = "none";
          });
        }
      })();

      document.getElementById("btnBack").onclick = function () {
        if (history.length > 1) history.back();
        else location.href = "/";
      };
    </script>
  </body>
</html>
