<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ERWENOW | لوحة العميل</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body>
    <div class="layout">
      <div class="top-nav">
        <h1 style="margin: 0">لوحة العميل</h1>
        <div class="btn-row">
          <a class="btn btn-ghost" href="/">الرئيسية</a>
          <a class="btn btn-ghost" href="/track">تتبع طلب</a>
          <a class="btn btn-ghost" href="/login" id="logout">خروج</a>
        </div>
      </div>

      <p class="sub" id="welcome">جارٍ التحميل…</p>

      <div class="card" id="profileCard" style="display: none">
        <span class="badge" id="roleBadge"></span>
        <p style="margin: 8px 0 0" id="phoneLine"></p>
      </div>

      <div class="card">
        <strong style="display: block; margin-bottom: 12px">خدمات المنصة</strong>
        <div class="grid-apps">
          <div class="app-tile" style="cursor: default">
            <strong>توصيل</strong>
            <span>طلبات من نقطة إلى أخرى عبر المندوب</span>
          </div>
          <div class="app-tile" style="cursor: default">
            <strong>مطاعم</strong>
            <span>طلبات طعام مع ربط تلقائي بتوصيل</span>
          </div>
          <div class="app-tile" style="cursor: default">
            <strong>متجر</strong>
            <span>تسوق وتوصيل (قريباً على نفس المسار)</span>
          </div>
          <div class="app-tile" style="cursor: default">
            <strong>خدمات</strong>
            <span>خدمات إضافية عبر نفس نظام الطلبات</span>
          </div>
        </div>
        <div class="btn-row" style="margin-top: 20px">
          <a class="btn btn-primary" href="/order" style="flex: 1; text-align: center; max-width: 100%">اطلب الآن</a>
        </div>
      </div>

      <div class="card">
        <strong>طلباتي الأخيرة</strong>
        <div id="ordersList" style="margin-top: 12px"></div>
      </div>
    </div>

    <script src="/assets/api.js"></script>
    <script>
      if (!window.PlatformAPI.getToken()) location.href = "/login";

      document.getElementById("logout").onclick = function (e) {
        e.preventDefault();
        window.PlatformAPI.setToken("");
        location.href = "/login";
      };

      var STATUS_AR = {
        new: "جديد",
        accepted: "تم الاستلام",
        delivering: "جاري التوصيل",
        delivered: "تم التسليم",
      };

      async function run() {
        try {
          var me = await window.PlatformAPI.api("/api/core/me");
          var role = (me.profile && me.profile.role) || "customer";
          if (role === "driver") {
            location.href = "/driver";
            return;
          }
          document.getElementById("welcome").textContent = "مرحباً بك في ERWENOW";
          document.getElementById("profileCard").style.display = "block";
          document.getElementById("roleBadge").textContent = role;
          document.getElementById("phoneLine").textContent = me.user.phone || me.user.email || me.user.id;

          var del = await window.PlatformAPI.api("/api/delivery/orders");
          var box = document.getElementById("ordersList");
          box.innerHTML = "";
          var list = (del.orders || []).slice(0, 8);
          if (!list.length) {
            box.innerHTML = "<p class=\"sub\" style=\"margin:0\">لا توجد طلبات بعد. اضغط «اطلب الآن».</p>";
            return;
          }
          list.forEach(function (o) {
            var row = document.createElement("div");
            row.className = "order-row";
            var st = STATUS_AR[o.status] || o.status;
            row.innerHTML =
              "<strong>" +
              o.id.slice(0, 8) +
              "…</strong> — " +
              st +
              "<br/><small>" +
              (o.drop_address || "—") +
              "</small><br/>";
            var a = document.createElement("a");
            a.className = "btn btn-ghost";
            a.href = "/track?id=" + encodeURIComponent(o.id);
            a.textContent = "تتبع";
            row.appendChild(a);
            box.appendChild(row);
          });
        } catch (e) {
          document.getElementById("welcome").textContent = e.message;
        }
      }

      run();
    </script>
  </body>
</html>
