<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ERVENOW | تسجيل متجر</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body>
    <div class="layout">
      <p><a href="/">← الرئيسية</a></p>
      <h1>تسجيل متجر جديد</h1>
      <p class="sub">أرسل طلبك للمراجعة — سيتم التواصل معك بعد الموافقة.</p>

      <div class="card">
        <h2 style="margin: 0 0 12px; font-size: 1.1rem">معلومات أساسية</h2>
        <label for="name">اسم المتجر</label>
        <input id="name" type="text" autocomplete="organization" />

        <label for="phone">رقم الجوال</label>
        <input id="phone" type="tel" inputmode="tel" placeholder="05xxxxxxxx" />

        <label for="email">البريد الإلكتروني</label>
        <input id="email" type="email" autocomplete="email" />

        <h2 style="margin: 20px 0 12px; font-size: 1.1rem">معلومات قانونية</h2>
        <label for="commercial_register">السجل التجاري (نص)</label>
        <input id="commercial_register" type="text" />

        <label for="cr_file">صورة السجل التجاري</label>
        <input id="cr_file" type="file" accept="image/*" />

        <h2 style="margin: 20px 0 12px; font-size: 1.1rem">نوع النشاط</h2>
        <label for="type">النوع</label>
        <select id="type">
          <option value="restaurant">مطعم</option>
          <option value="pharmacy">صيدلية</option>
          <option value="supermarket">سوبرماركت</option>
          <option value="minimarket">ميني ماركت</option>
          <option value="vegetables">محل خضار</option>
          <option value="butcher">ملحمة</option>
          <option value="fish">بيع الأسماك</option>
          <option value="home_business">أسرة منتجة</option>
          <option value="services">خدمات</option>
        </select>

        <h2 style="margin: 20px 0 12px; font-size: 1.1rem">الموقع</h2>
        <p class="sub" id="loc_hint" style="margin-top: 0">اضغط لتحديد موقع المتجر (اختياري).</p>
        <button type="button" class="btn btn-primary" id="btnLoc">تحديد الموقع</button>
        <input type="hidden" id="lat" />
        <input type="hidden" id="lng" />

        <button type="button" class="btn btn-primary" id="btnSend" style="margin-top: 20px">إرسال الطلب</button>

        <div class="msg" id="msg" style="display: none"></div>
      </div>
    </div>

    <script src="/assets/api.js"></script>
    <script>
      var latEl = document.getElementById("lat");
      var lngEl = document.getElementById("lng");
      var locHint = document.getElementById("loc_hint");
      var fileDataUrl = null;
      var fileName = null;

      function show(text, isOk) {
        var el = document.getElementById("msg");
        el.style.display = "block";
        el.className = "msg " + (isOk ? "ok" : "err");
        el.textContent = text;
      }

      function normalizePhoneInput() {
        var el = document.getElementById("phone");
        var d = String(el.value || "").replace(/\D/g, "");
        if (d.startsWith("9665")) d = "0" + d.slice(3);
        else if (d.startsWith("5") && d.length === 9) d = "0" + d;
        if (d.length > 10) d = d.slice(0, 10);
        el.value = d;
        return d;
      }

      function isValidSaudiPhone05(v) {
        return /^05\d{8}$/.test(String(v || ""));
      }

      document.getElementById("cr_file").onchange = function (ev) {
        var f = ev.target.files && ev.target.files[0];
        fileDataUrl = null;
        fileName = null;
        if (!f) return;
        fileName = f.name || "upload";
        var r = new FileReader();
        r.onload = function () {
          fileDataUrl = r.result;
        };
        r.readAsDataURL(f);
      };

      document.getElementById("phone").addEventListener("input", normalizePhoneInput);
      document.getElementById("phone").addEventListener("blur", normalizePhoneInput);

      document.getElementById("btnLoc").onclick = function () {
        if (!navigator.geolocation) {
          locHint.textContent = "المتصفح لا يدعم تحديد الموقع.";
          return;
        }
        locHint.textContent = "جاري تحديد الموقع…";
        navigator.geolocation.getCurrentPosition(
          function (pos) {
            latEl.value = String(pos.coords.latitude);
            lngEl.value = String(pos.coords.longitude);
            locHint.textContent = "تم حفظ الإحداثيات.";
          },
          function () {
            locHint.textContent = "تعذر تحديد الموقع — يمكنك المتابعة بدون موقع.";
          },
          { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
        );
      };

      document.getElementById("btnSend").onclick = async function () {
        var btn = document.getElementById("btnSend");
        try {
          btn.disabled = true;
          btn.textContent = "جارٍ إرسال الطلب...";
          normalizePhoneInput();

          var name = document.getElementById("name").value.trim();
          var phone = document.getElementById("phone").value.trim();
          var email = document.getElementById("email").value.trim();
          var commercial_register = document.getElementById("commercial_register").value.trim();
          var type = document.getElementById("type").value;
          var lat = latEl.value.trim();
          var lng = lngEl.value.trim();

          if (!name) return show("أدخل اسم المتجر", false);
          if (!phone) return show("أدخل رقم الجوال", false);
          if (!isValidSaudiPhone05(phone)) return show("أدخل رقم سعودي صحيح يبدأ بـ 05", false);
          var crInput = document.getElementById("cr_file");
          if (crInput.files && crInput.files[0] && !fileDataUrl) {
            return show("انتظر لحظة حتى تُحمَّل صورة السجل", false);
          }

          var body = {
            name: name,
            phone: phone,
            email: email || undefined,
            commercial_register: commercial_register || undefined,
            type: type,
          };
          if (lat && lng) {
            body.lat = Number(lat);
            body.lng = Number(lng);
          }
          if (fileDataUrl) {
            body.commercialRegisterFileBase64 = fileDataUrl;
            body.commercialRegisterFileName = fileName;
          }

          var j = await window.PlatformAPI.api("/api/store/register", {
            method: "POST",
            body: body,
          });
          show((j.message || "تم الإرسال") + (j.id ? " — رقم الطلب: " + j.id : "") + " ✅", true);
          document.getElementById("name").value = "";
          document.getElementById("phone").value = "";
          document.getElementById("email").value = "";
          document.getElementById("commercial_register").value = "";
          document.getElementById("type").value = "restaurant";
          document.getElementById("cr_file").value = "";
          latEl.value = "";
          lngEl.value = "";
          fileDataUrl = null;
          fileName = null;
          locHint.textContent = "اضغط لتحديد موقع المتجر (اختياري).";
        } catch (e) {
          show(String(e.message || e), false);
        } finally {
          btn.disabled = false;
          btn.textContent = "إرسال الطلب";
        }
      };
    </script>
  </body>
</html>
