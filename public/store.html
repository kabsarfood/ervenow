<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ERVENOW | المتجر</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/assets/styles.css" />
    <style>
      :root {
        --sp-radius: 22px;
        --sp-shadow: 0 14px 48px rgba(42, 24, 16, 0.1);
        --sp-shadow-soft: 0 8px 32px rgba(42, 24, 16, 0.07);
      }

      .store-shell {
        max-width: 920px;
        margin: 0 auto;
        padding: 20px 16px 56px;
      }

      .store-breadcrumb {
        margin-bottom: 16px;
        font-weight: 700;
      }

      .store-breadcrumb a {
        text-decoration: none;
      }

      .store-header-wrap {
        margin-bottom: 20px;
      }

      .store-header {
        border-radius: var(--sp-radius);
        overflow: hidden;
        background: #fffcfa;
        border: 1px solid rgba(61, 34, 19, 0.08);
        box-shadow: var(--sp-shadow);
      }

      .store-header__banner {
        position: relative;
        width: 100%;
        aspect-ratio: 21 / 9;
        min-height: 140px;
        background: linear-gradient(120deg, #efe6dc, #f4ebe3 45%, #e8d9cc);
      }

      .store-header__banner img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      .store-header__content {
        padding: 20px 20px 22px;
      }

      .store-header__content h1 {
        margin: 0 0 8px;
        font-size: clamp(1.35rem, 4vw, 1.85rem);
        font-weight: 800;
        line-height: 1.25;
        letter-spacing: -0.02em;
      }

      .store-header__cat {
        margin: 0 0 10px;
        font-size: 0.95rem;
        font-weight: 700;
        color: #7a6558;
      }

      .store-header__dist {
        margin: 0 0 8px;
        font-size: 0.92rem;
        font-weight: 800;
        color: #b9872f;
      }

      .store-header__rating {
        margin: 0 0 18px;
        font-size: 0.88rem;
        color: #5c4638;
      }

      .store-order-btn {
        width: 100%;
        max-width: 360px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        padding: 14px 22px;
        border: none;
        border-radius: 16px;
        font-family: inherit;
        font-size: 1.05rem;
        font-weight: 800;
        cursor: pointer;
        color: #fffdf8;
        background: linear-gradient(135deg, #3d2213, #6b3d22);
        box-shadow: 0 10px 32px rgba(61, 34, 19, 0.28);
        transition: transform 0.2s, box-shadow 0.2s, filter 0.2s;
      }

      .store-order-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 14px 40px rgba(61, 34, 19, 0.32);
        filter: brightness(1.05);
      }

      .store-order-btn:active {
        transform: translateY(0);
      }

      .store-order-btn:focus-visible {
        outline: 3px solid #c9a227;
        outline-offset: 3px;
      }

      .store-section {
        border-radius: var(--sp-radius);
        box-shadow: var(--sp-shadow-soft);
      }

      .prod-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 14px;
      }

      .prod-card {
        border-radius: 16px;
        overflow: hidden;
        box-shadow: 0 6px 22px rgba(42, 24, 16, 0.06);
        transition: box-shadow 0.2s, transform 0.2s;
      }

      .prod-card:hover {
        transform: translateY(-3px);
        box-shadow: 0 12px 36px rgba(42, 24, 16, 0.1);
      }

      .prod-card img {
        width: 100%;
        height: 140px;
        object-fit: cover;
        border-radius: 0;
        background: #f5f1ea;
      }
    </style>
  </head>
  <body>
    <div class="store-shell">
      <p class="store-breadcrumb">
        <a href="/">← الرئيسية</a>
        ·
        <a id="browseBack" href="/stores">المتاجر</a>
        ·
        <a href="/browse">تصفح حسب النوع</a>
      </p>

      <div id="storeHeaderWrap" class="store-header-wrap" style="display: none">
        <div class="store-header">
          <div class="store-header__banner">
            <img id="storeBannerImg" src="" alt="" width="920" height="394" decoding="async" fetchpriority="high" />
          </div>
          <div class="store-header__content">
            <h1 id="storeTitle">—</h1>
            <p id="storeCategory" class="store-header__cat">—</p>
            <p id="storeDistLine" class="store-header__dist">📍 — كم</p>
            <p id="storeRatingLine" class="store-header__rating">—</p>
            <p class="sub" id="storeAddressLine" style="margin: 0 0 14px"></p>
            <button type="button" class="store-order-btn" id="orderBtn">🚚 اطلب توصيل</button>
          </div>
        </div>
      </div>

      <div class="card store-section" style="margin-bottom: 16px">
        <h2 style="margin: 0 0 14px">المنتجات</h2>
        <div id="products" class="prod-grid"></div>
        <div class="row" style="margin-top: 14px; gap: 8px; flex-wrap: wrap">
          <button type="button" class="btn btn-ghost" id="btnMore" style="display: none">تحميل المزيد</button>
        </div>
      </div>

      <div class="card store-section" id="reviewCard">
        <h2 style="margin: 0 0 14px">التقييمات</h2>
        <div id="reviews"></div>
        <div id="reviewFormWrap" style="margin-top: 16px; display: none">
          <label for="ratingSel">أضف تقييماً</label>
          <select id="ratingSel">
            <option value="5">5 ★</option>
            <option value="4">4 ★</option>
            <option value="3">3 ★</option>
            <option value="2">2 ★</option>
            <option value="1">1 ★</option>
          </select>
          <label for="reviewComment" style="margin-top: 8px">تعليق (اختياري)</label>
          <textarea id="reviewComment" rows="2"></textarea>
          <button type="button" class="btn btn-primary" id="btnReview" style="margin-top: 10px">إرسال التقييم</button>
        </div>
        <p class="sub" id="reviewLoginHint" style="margin-top: 12px; display: none">
          <a href="/login?role=customer">سجّل الدخول كزائر المنصة</a> لإضافة تقييم.
        </p>
      </div>

      <div class="msg" id="msg" style="display: none"></div>
    </div>

    <script src="/assets/cart.js"></script>
    <script src="/assets/api-config.js"></script>
    <script src="/assets/api.js"></script>
    <script>
      var params = new URLSearchParams(window.location.search);
      var storeId = params.get("id");
      var offset = 0;
      var limit = 12;
      var total = 0;
      var storeMeta = { name: "", type: "supermarket", id: "" };
      var lastProducts = [];

      var TYPE_AR = {
        restaurant: "مطعم",
        pharmacy: "صيدلية",
        supermarket: "سوبر ماركت",
        minimarket: "بقالة",
        vegetables: "خضار وفواكه",
        butcher: "لحوم",
        fish: "أسماك",
        home_business: "منتج منزلي",
        flowers_gifts: "ورد وهدايا",
        sweets: "حلويات",
        services: "خدمات",
        other: "أخرى",
        plumber: "سباكة",
        electrician: "كهرباء",
        cleaning: "تنظيف",
        nursery: "تنسيق حدائق",
        ac_technician: "تكييف",
        vehicle_transfer: "نقل مركبات",
        internal_delivery: "توصيل",
        pickup_truck: "ونيت",
        furniture_move: "نقل أثاث",
        gas_delivery: "غاز",
      };

      function typeLabelAr(type) {
        var t = String(type || "").toLowerCase();
        return TYPE_AR[t] || t || "—";
      }

      var defaultBanner =
        "data:image/svg+xml," +
        encodeURIComponent(
          '<svg xmlns="http://www.w3.org/2000/svg" width="920" height="394" viewBox="0 0 920 394"><defs><linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#efe6dc"/><stop offset="100%" stop-color="#e5d8cc"/></linearGradient></defs><rect fill="url(#g)" width="920" height="394"/><text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" fill="#c9a227" font-family="sans-serif" font-size="28" font-weight="700">ERVENOW</text></svg>'
        );

      function getUserGeo() {
        return new Promise(function (resolve) {
          if (!navigator.geolocation) return resolve(null);
          navigator.geolocation.getCurrentPosition(
            function (p) {
              resolve({ lat: p.coords.latitude, lng: p.coords.longitude });
            },
            function () {
              resolve(null);
            },
            { enableHighAccuracy: false, timeout: 9000, maximumAge: 120000 }
          );
        });
      }

      function addProductToCart(p) {
        if (!storeId || !p) return;
        addToCart({
          type: storeMeta.type || "supermarket",
          title: (storeMeta.name || "متجر") + " — " + String(p.name || "منتج"),
          price: Number(p.price) || 0,
          data: { store_id: storeId, product_id: p.id, qty: 1 },
        });
        show("تمت الإضافة إلى السلة", true);
      }

      function show(text, ok) {
        var el = document.getElementById("msg");
        el.style.display = "block";
        el.className = "msg " + (ok ? "ok" : "err");
        el.textContent = text;
      }

      function esc(s) {
        return String(s || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/"/g, "&quot;");
      }

      async function loadStore() {
        if (!storeId) {
          show("معرّف المتجر غير موجود في الرابط (?id=)", false);
          return;
        }
        var geo = await getUserGeo();
        var geoQs = "";
        if (geo) {
          geoQs =
            "?user_lat=" +
            encodeURIComponent(geo.lat) +
            "&user_lng=" +
            encodeURIComponent(geo.lng);
        }
        var headers = {};
        var t = window.PlatformAPI && window.PlatformAPI.getToken && window.PlatformAPI.getToken();
        if (t) headers.Authorization = "Bearer " + t;

        var url =
          window.PlatformAPI.apiUrl("/api/store/" + encodeURIComponent(storeId) + geoQs);
        var res = await fetch(url, { headers: headers });
        var data = await res.json().catch(function () {
          return {};
        });
        if (!res.ok || !data.store) {
          show(data.error || "تعذر تحميل المتجر", false);
          return;
        }
        var store = data.store;
        storeMeta.id = store.id || storeId;
        storeMeta.name = store.name || store.label || "";
        storeMeta.type = store.type || "supermarket";

        document.getElementById("storeHeaderWrap").style.display = "block";

        var title = store.label || store.name || "متجر";
        document.getElementById("storeTitle").textContent = title;

        var cat = typeLabelAr(store.category || store.type);
        document.getElementById("storeCategory").textContent = cat;

        var distText =
          store.distance_km != null && Number.isFinite(Number(store.distance_km))
            ? "📍 " + Number(store.distance_km).toFixed(1) + " كم"
            : "📍 — كم";
        document.getElementById("storeDistLine").textContent = distText;

        var ratingLine =
          store.masked || data.browse_masked
            ? "التقييم والطلبات تظهر بالكامل بعد تسجيل الدخول."
            : "★ " +
              (Number(store.average_rating) || 0).toFixed(1) +
              " (" +
              (Number(store.rating_count) || 0) +
              " تقييم) · " +
              (Number(store.total_orders) || 0) +
              " طلب";
        document.getElementById("storeRatingLine").textContent = ratingLine;

        document.getElementById("storeAddressLine").textContent =
          store.address || store.location_text || "";

        var imgEl = document.getElementById("storeBannerImg");
        imgEl.onerror = function () {
          imgEl.onerror = null;
          imgEl.src = defaultBanner;
        };
        if (store.logo_url) {
          imgEl.src = store.logo_url;
        } else {
          imgEl.src = defaultBanner;
        }

        document.getElementById("orderBtn").onclick = function () {
          window.location.href = "/order.html?store_id=" + encodeURIComponent(storeMeta.id || storeId);
        };

        if (window.PlatformAPI && window.PlatformAPI.getToken && window.PlatformAPI.getToken()) {
          document.getElementById("reviewFormWrap").style.display = "block";
          document.getElementById("reviewLoginHint").style.display = "none";
        } else {
          document.getElementById("reviewLoginHint").style.display = "block";
        }
      }

      function renderProducts(rows, append) {
        var box = document.getElementById("products");
        rows = rows || [];
        if (!append) {
          lastProducts = rows.slice();
          box.innerHTML = "";
        } else {
          lastProducts = lastProducts.concat(rows);
        }

        if (!lastProducts.length) {
          box.innerHTML = '<p class="sub">لا منتجات بعد — يمكن الطلب العام عبر زر التوصيل أعلاه.</p>';
          return;
        }

        var html = rows
          .map(function (p) {
            var im = p.image_url
              ? '<img src="' + esc(p.image_url) + '" alt="" loading="lazy" decoding="async" />'
              : '<div style="height:140px;background:#f0ebe3"></div>';
            return (
              '<div class="card prod-card">' +
              im +
              "<strong>" +
              esc(p.name) +
              "</strong>" +
              '<p class="sub">' +
              esc(p.description || "") +
              "</p>" +
              "<div><strong>" +
              (Number(p.price) || 0).toFixed(2) +
              ' ريال</strong></div><button type="button" class="btn btn-primary btn-add-cart" style="margin-top:10px;width:100%" data-pid="' +
              esc(p.id) +
              '">إضافة للسلة</button></div>'
            );
          })
          .join("");

        if (append) box.innerHTML += html;
        else box.innerHTML = html;
      }

      document.getElementById("products").addEventListener("click", function (ev) {
        var btn = ev.target.closest(".btn-add-cart");
        if (!btn) return;
        var pid = btn.getAttribute("data-pid");
        var p = lastProducts.find(function (x) {
          return String(x.id) === String(pid);
        });
        addProductToCart(p);
      });

      async function loadProducts(append) {
        if (!storeId) return;
        var qs =
          window.PlatformAPI.apiUrl(
            "/api/store/products?store_id=" +
              encodeURIComponent(storeId) +
              "&limit=" +
              limit +
              "&offset=" +
              offset
          );
        var res = await fetch(qs);
        var data = await res.json().catch(function () {
          return {};
        });
        if (!data.products) {
          renderProducts([], append);
          return;
        }
        total = data.total || 0;
        renderProducts(data.products, append);
        offset += data.products.length;
        document.getElementById("btnMore").style.display = offset < total ? "inline-block" : "none";
      }

      async function loadReviews() {
        if (!storeId) return;
        var res = await fetch(
          window.PlatformAPI.apiUrl("/api/store/reviews?store_id=" + encodeURIComponent(storeId) + "&limit=30")
        );
        var data = await res.json().catch(function () {
          return {};
        });
        var box = document.getElementById("reviews");
        var rows = data.reviews || [];
        if (!rows.length) {
          box.innerHTML = '<p class="sub">لا تقييمات بعد</p>';
          return;
        }
        box.innerHTML = rows
          .map(function (r) {
            return (
              '<div class="card" style="padding:12px;margin-bottom:8px;border-radius:14px">' +
              "<strong>★ " +
              esc(r.rating) +
              "</strong>" +
              '<p class="sub" style="margin:6px 0 0">' +
              esc(r.comment || "—") +
              "</p></div>"
            );
          })
          .join("");
      }

      document.getElementById("btnMore").onclick = function () {
        loadProducts(true);
      };

      document.getElementById("btnReview").onclick = async function () {
        try {
          var rating = Number(document.getElementById("ratingSel").value);
          var comment = document.getElementById("reviewComment").value.trim();
          await window.PlatformAPI.api("/api/store/reviews", {
            method: "POST",
            body: { store_id: storeId, rating: rating, comment: comment || undefined },
          });
          show("شكراً — تم حفظ التقييم", true);
          document.getElementById("reviewComment").value = "";
          await loadStore();
          await loadReviews();
        } catch (e) {
          show(String(e.message || e), false);
        }
      };

      (async function () {
        try {
          var bt = sessionStorage.getItem("ervenow_browse_type");
          if (bt) {
            document.getElementById("browseBack").href = "/browse?type=" + encodeURIComponent(bt);
          }
        } catch (e) {}
        try {
          await loadStore();
          offset = 0;
          await loadProducts(false);
          await loadReviews();
        } catch (e) {
          show(String(e.message || e), false);
        }
      })();
    </script>
  </body>
</html>
