<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>محفظة المندوب | ERVENOW</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <style>
      body { margin: 0; font-family: Cairo, sans-serif; background: #f8f4ef; color: #2b1f16; }
      .wrap { max-width: 980px; margin: 22px auto; padding: 14px; }
      .top { display: flex; justify-content: space-between; gap: 10px; flex-wrap: wrap; align-items: center; }
      .btn { border: 0; border-radius: 10px; padding: 9px 12px; cursor: pointer; font-family: inherit; font-weight: 700; }
      .btn-primary { background: #5b371d; color: #fff; }
      .btn-ghost { border: 1px solid #5b371d; background: #fff; color: #5b371d; text-decoration: none; display: inline-block; }
      .card { background: #fff; border: 1px solid #e5d8cb; border-radius: 14px; padding: 12px; margin-top: 12px; }
      .muted { color: #6e5a4a; }
      .row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
      input { padding: 10px; border-radius: 10px; border: 1px solid #d7c6b5; font-family: inherit; min-width: 200px; }
      .tx { border: 1px solid #ecdccf; border-radius: 10px; padding: 8px; margin-bottom: 8px; background: #fffdf9; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="top">
        <h2 style="margin:0;color:#5b371d">محفظة المندوب</h2>
        <div class="row">
          <a class="btn btn-ghost" href="/driver">الرجوع لصفحة المندوب</a>
          <button class="btn btn-primary" id="refreshBtn">تحديث</button>
        </div>
      </div>

      <div class="card">
        <strong>الرصيد</strong>
        <p id="balanceLine" class="muted">جارٍ التحميل...</p>
      </div>

      <div class="card">
        <strong>سحب الأموال (OTP)</strong>
        <p class="muted">اكتب المبلغ ثم أرسل رمز التحقق إلى جوالك، وبعدها أكّد السحب.</p>
        <div class="row">
          <input id="amount" type="number" min="20" step="0.01" placeholder="المبلغ (20 ريال كحد أدنى)" />
          <button class="btn btn-primary" id="sendOtpBtn">إرسال رمز السحب</button>
        </div>
        <div class="row">
          <input id="otpCode" placeholder="رمز التحقق" />
          <button class="btn btn-ghost" id="confirmOtpBtn">تأكيد السحب</button>
        </div>
        <p class="muted" id="otpHint"></p>
      </div>

      <div class="card">
        <strong>سجل العمليات</strong>
        <div id="txList"></div>
      </div>
    </div>

    <script src="/assets/cart.js"></script>
    <script src="/assets/api-config.js"></script>
    <script src="/assets/api.js"></script>
    <script>
      var token = window.PlatformAPI.getToken();
      if (!token) location.href = "/driver-login";

      async function loadWallet() {
        try {
          var w = await window.PlatformAPI.api("/api/wallet");
          document.getElementById("balanceLine").innerText =
            "الرصيد الحالي: " + (w.balance || 0) +
            " ريال | إجمالي المكتسب: " + (w.total_earned || 0) +
            " ريال | إجمالي المسحوب: " + (w.total_withdrawn || 0) + " ريال";
        } catch (e1) {
          try {
            var dw = await window.PlatformAPI.api("/api/driver/wallet");
            document.getElementById("balanceLine").innerText =
              "الرصيد الحالي: " + (dw.balance || 0) +
              " ريال | إجمالي المكتسب: " + (dw.total_earned || 0) +
              " ريال | إجمالي المسحوب: " + (dw.total_withdrawn || 0) + " ريال";
          } catch (e2) {
            showError((e1 && e1.message) || (e2 && e2.message) || "تعذر تحميل الرصيد");
          }
        }
      }

      async function loadTransactions() {
        try {
          var j = await window.PlatformAPI.api("/api/wallet/transactions");
          var box = document.getElementById("txList");
          box.innerHTML = "";
          (j.transactions || []).forEach(function (t) {
            var div = document.createElement("div");
            div.className = "tx";
            div.innerHTML =
              "<strong>" + (t.type === "earning" ? "إيداع" : "سحب") + "</strong>" +
              "<div>المبلغ: " + t.amount + " ريال</div>" +
              "<div>ملاحظة: " + (t.note || "—") + "</div>" +
              "<div class='muted'>" + (t.created_at || "") + "</div>";
            box.appendChild(div);
          });
          if (!j.transactions || !j.transactions.length) {
            box.innerHTML = "<p class='muted'>لا توجد عمليات بعد</p>";
          }
        } catch (e) {
          showError(e.message || "تعذر تحميل العمليات");
        }
      }

      var otpLockTimer = null;
      function setConfirmLock(seconds) {
        var btn = document.getElementById("confirmOtpBtn");
        if (!btn) return;
        if (otpLockTimer) {
          clearInterval(otpLockTimer);
          otpLockTimer = null;
        }
        var remain = Number(seconds) || 0;
        if (remain <= 0) {
          btn.disabled = false;
          btn.innerText = "تأكيد السحب";
          return;
        }
        btn.disabled = true;
        btn.innerText = "مقفول (" + remain + "ث)";
        otpLockTimer = setInterval(function () {
          remain -= 1;
          if (remain <= 0) {
            clearInterval(otpLockTimer);
            otpLockTimer = null;
            btn.disabled = false;
            btn.innerText = "تأكيد السحب";
            return;
          }
          btn.innerText = "مقفول (" + remain + "ث)";
        }, 1000);
      }

      function extractLockSeconds(message) {
        var msg = String(message || "");
        var m1 = msg.match(/lock_seconds["':\s]*([0-9]+)/i);
        if (m1 && m1[1]) return Number(m1[1]);
        var m2 = msg.match(/([0-9]+)\s*ثانية/);
        if (m2 && m2[1]) return Number(m2[1]);
        return 0;
      }

      var sendOtp = safeClick(async function () {
        var amt = Number(document.getElementById("amount").value);
        if (!Number.isFinite(amt) || amt < 20) {
          showError("الحد الأدنى للسحب 20 ريال");
          return;
        }
        try {
          var r = await window.PlatformAPI.api("/api/wallet/withdraw/send-otp", {
            method: "POST",
            body: { amount: amt },
          });
          if (r.dev_otp) {
            document.getElementById("otpHint").innerText = "رمز التطوير: " + r.dev_otp;
          } else {
            document.getElementById("otpHint").innerText = "تم إرسال رمز التحقق إلى جوالك";
          }
          showSuccess("تم إرسال رمز السحب");
        } catch (e) {
          var lockSec1 = extractLockSeconds(e.message);
          if (lockSec1 > 0) setConfirmLock(lockSec1);
          showError(e.message || "تعذر إرسال الرمز");
        }
      });

      var confirmOtp = safeClick(async function () {
        var code = (document.getElementById("otpCode").value || "").trim();
        if (!code) {
          showError("اكتب رمز التحقق");
          return;
        }
        try {
          await window.PlatformAPI.api("/api/wallet/withdraw/confirm-otp", {
            method: "POST",
            body: { code: code },
          });
          showSuccess("تم إرسال طلب السحب للإدارة");
          document.getElementById("otpCode").value = "";
          document.getElementById("otpHint").innerText = "";
          setConfirmLock(0);
          await loadWallet();
          await loadTransactions();
        } catch (e) {
          var msg = String(e.message || "");
          var lockSec2 = extractLockSeconds(msg);
          if (lockSec2 > 0) setConfirmLock(lockSec2);
          showError(msg || "تعذر تأكيد الرمز");
        }
      });

      document.getElementById("sendOtpBtn").onclick = sendOtp;
      document.getElementById("confirmOtpBtn").onclick = confirmOtp;
      document.getElementById("refreshBtn").onclick = function () {
        loadWallet();
        loadTransactions();
      };

      loadWallet();
      loadTransactions();
    </script>
  </body>
</html>
