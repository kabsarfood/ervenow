<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ERVENOW | المندوب</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/assets/styles.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
      .driver-nav-dock {
        display: none;
        position: fixed;
        inset-inline: 0;
        bottom: 0;
        z-index: 10050;
        padding: 12px 14px calc(14px + env(safe-area-inset-bottom, 0px));
        background: linear-gradient(180deg, transparent, rgba(15, 23, 42, 0.96));
      }
      .driver-nav-dock.is-visible {
        display: block;
      }
      .driver-nav-dock-inner {
        display: flex;
        flex-direction: column;
        gap: 10px;
        max-width: 520px;
        margin: 0 auto;
      }
      .driver-order-chip {
        text-align: center;
        font-size: 0.88rem;
        font-weight: 700;
        color: rgba(255, 255, 255, 0.92);
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.35);
      }
      .driver-main-action {
        font-family: inherit;
        font-size: 1.18rem;
        font-weight: 800;
        line-height: 1.2;
        padding: 22px 16px;
        min-height: 62px;
        width: 100%;
        border: none;
        border-radius: 16px;
        cursor: pointer;
        box-shadow: 0 4px 18px rgba(0, 0, 0, 0.28);
      }
      .driver-main-action:active:not(:disabled) {
        transform: scale(0.99);
      }
      .driver-main-action:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }
      .driver-main-action.mode-pending {
        background: linear-gradient(180deg, #22c55e, #15803d);
        color: #fff;
      }
      .driver-main-action.mode-nav {
        background: linear-gradient(180deg, #38bdf8, #1d4ed8);
        color: #fff;
      }
      .driver-main-action.mode-finish {
        background: linear-gradient(180deg, #fbbf24, #b45309);
        color: #1c1917;
      }
      body.driver-nav-dock-active .layout {
        padding-bottom: calc(130px + env(safe-area-inset-bottom, 0px));
      }
      body.driver-ultra-mode #walletCard,
      body.driver-ultra-mode #driverRatingLine {
        display: none !important;
      }
      body.driver-ultra-mode .top-nav h1 {
        font-size: 1.05rem;
      }
      body.driver-ultra-mode .top-nav .btn-row a:not(#driverLogout) {
        display: none;
      }
      body.driver-ultra-mode #ordersCard .card > .badge:first-child + #orders {
        max-height: 100px;
        overflow: auto;
      }
      body.driver-ultra-mode #driverMapCard {
        min-height: 52vh;
      }
      body.driver-ultra-mode #driverLiveMap {
        min-height: 46vh !important;
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <div class="top-nav">
        <h1 style="margin: 0">مندوب التوصيل</h1>
        <div class="btn-row">
          <a class="btn btn-ghost" href="/orders">طلبات المنصة</a>
          <a class="btn btn-ghost" href="/driver-wallet">المحفظة</a>
          <a class="btn btn-ghost" href="/track">تتبع</a>
          <a class="btn btn-ghost" href="/login" id="driverLogout">خروج</a>
        </div>
      </div>
      <p class="sub" id="who"></p>
      <p class="sub" id="driverRatingLine" style="margin-top: 6px" translate="no">—</p>

      <div class="card" id="walletCard">
        <div class="badge">المحفظة</div>
        <p class="sub">تم نقل المحفظة إلى صفحة مستقلة لأداء أفضل وسحب آمن عبر OTP.</p>
        <div class="btn-row" style="margin-top: 10px">
          <a class="btn btn-primary" href="/driver-wallet">فتح صفحة المحفظة</a>
        </div>
      </div>

      <div class="card" id="ordersCard">
        <div class="badge">الطلبات</div>
        <div id="orders"></div>
        <button type="button" class="btn btn-primary" id="btnRefresh">تحديث</button>
      </div>

      <div class="card" id="driverMapCard">
        <div class="badge">الخريطة</div>
        <p class="sub" style="margin-top: 8px" id="locStatus">—</p>
        <div id="driverLiveMap" style="min-height: 280px; border-radius: 12px; border: 1px solid rgba(0,0,0,.12); margin-top: 10px"></div>
      </div>

      <div class="msg err" id="err" style="display: none"></div>
    </div>

    <div id="driverMapNavDock" class="driver-nav-dock" role="region" aria-label="إجراء التوصيل">
      <div class="driver-nav-dock-inner">
        <div class="driver-order-chip" id="driverOrderChip"></div>
        <button type="button" class="driver-main-action" id="driverMainAction" disabled>—</button>
      </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="/assets/api-config.js"></script>
    <script src="/assets/api.js"></script>
    <script>
      var token = window.PlatformAPI.getToken();
      var isLoggedIn = !!token;
      if (!token) {
        document.body.innerHTML =
          '<div style="text-align:center;margin-top:50px;">' +
          "<h2>🔒 الرجاء تسجيل الدخول كمندوب</h2>" +
          '<a href="/driver-login">تسجيل الدخول</a>' +
          "</div>";
        throw new Error("auth");
      }

      var PROXIMITY_M = 30;
      var NEAR_DROP_MANUAL_M = 45;

      var locStatus = document.getElementById("locStatus");
      var activeOrderId = null;
      var isWatching = false;
      var locTimer = null;
      var myUserId = null;
      var pollTimer = null;
      var knownOrders = [];
      var lastLat = null;
      var lastLng = null;
      var lastSentAt = 0;
      var sendingLocation = false;
      var sendingGpsError = false;
      var presenceTimer = null;
      var map = null;
      var driverMarker = null;
      var pickupMarker = null;
      var dropMarker = null;
      var routeLine = null;
      var lastRouteKey = "";
      var layerSatellite = null;
      var layerTerrain = null;

      var navOrderRef = null;
      var pendingOrderRef = null;
      var proximityTimer = null;
      var autoGateOrderId = null;
      var autoPickupSent = false;
      var autoDeliverSent = false;
      /** pending | accepted | picked (خرج للتسليم) | delivering (إتمام) */
      var driverMainActionKind = "";

      function haversineM(lat1, lng1, lat2, lng2) {
        var R = 6371000;
        var r1 = (lat1 * Math.PI) / 180;
        var r2 = (lat2 * Math.PI) / 180;
        var dLat = ((lat2 - lat1) * Math.PI) / 180;
        var dLng = ((lng2 - lng1) * Math.PI) / 180;
        var s =
          Math.sin(dLat / 2) * Math.sin(dLat / 2) +
          Math.cos(r1) * Math.cos(r2) * Math.sin(dLng / 2) * Math.sin(dLng / 2);
        return 2 * R * Math.asin(Math.min(1, Math.sqrt(s)));
      }

      function speakArabic(text) {
        try {
          if (!text || !window.speechSynthesis) return;
          window.speechSynthesis.cancel();
          var u = new SpeechSynthesisUtterance(String(text));
          u.lang = "ar-SA";
          u.rate = 0.95;
          var voices = window.speechSynthesis.getVoices();
          var ar = voices.find(function (v) {
            return /ar/i.test(v.lang || "");
          });
          if (ar) u.voice = ar;
          window.speechSynthesis.speak(u);
        } catch (e) {}
      }

      if (window.speechSynthesis && speechSynthesis.getVoices().length === 0) {
        speechSynthesis.addEventListener("voiceschanged", function () {}, { once: true });
      }

      function openGoogleMapsDir(lat, lng) {
        var la = Number(lat);
        var ln = Number(lng);
        if (!Number.isFinite(la) || !Number.isFinite(ln)) return;
        var dest = encodeURIComponent(la + "," + ln);
        window.open("https://www.google.com/maps/dir/?api=1&destination=" + dest, "_blank", "noopener,noreferrer");
      }

      function resetAutoGatesForOrder(oid) {
        if (String(autoGateOrderId) !== String(oid)) {
          autoGateOrderId = oid;
          autoPickupSent = false;
          autoDeliverSent = false;
        }
      }

      function setUltraMode(on) {
        if (on) document.body.classList.add("driver-ultra-mode");
        else document.body.classList.remove("driver-ultra-mode");
      }

      function initDriverMap() {
        if (map || typeof L === "undefined") return;
        map = L.map("driverLiveMap").setView([24.7136, 46.6753], 12);
        layerSatellite = L.tileLayer(
          "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",
          {
            attribution: "Tiles &copy; Esri",
            maxZoom: 19,
          }
        );
        layerTerrain = L.tileLayer("https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png", {
          attribution: "&copy; OpenStreetMap contributors, SRTM | OpenTopoMap",
          maxZoom: 17,
        });
        layerSatellite.addTo(map);
        L.control.layers(
          {
            "أقمار صناعية": layerSatellite,
            "تضاريس": layerTerrain,
          },
          null,
          { position: "topright" }
        ).addTo(map);
      }

      function updateDriverMarker(lat, lng) {
        initDriverMap();
        if (!map) return;
        var la = Number(lat);
        var ln = Number(lng);
        if (!Number.isFinite(la) || !Number.isFinite(ln)) return;
        if (!driverMarker) {
          driverMarker = L.marker([la, ln], { title: "موقع المندوب" }).addTo(map).bindPopup("📍 موقعك الحالي");
        } else {
          driverMarker.setLatLng([la, ln]);
        }
        map.setView([la, ln], Math.max(14, map.getZoom()), { animate: true });
        try {
          map.invalidateSize();
        } catch (e) {}
      }

      function clearOrderEndpoints() {
        if (!map) return;
        if (pickupMarker) {
          map.removeLayer(pickupMarker);
          pickupMarker = null;
        }
        if (dropMarker) {
          map.removeLayer(dropMarker);
          dropMarker = null;
        }
        if (routeLine) {
          map.removeLayer(routeLine);
          routeLine = null;
        }
        lastRouteKey = "";
      }

      function endpointIcon(label, bg) {
        return L.divIcon({
          className: "driver-endpoint-icon",
          html:
            '<div style="padding:4px 8px;border-radius:10px;background:' +
            bg +
            ';color:#fff;font-weight:800;font-size:12px;white-space:nowrap;">' +
            label +
            "</div>",
          iconSize: [72, 24],
          iconAnchor: [36, 12],
        });
      }

      function updateOrderEndpoints(order) {
        initDriverMap();
        if (!map || !order) return;
        var pLat = Number(order.pickup_lat);
        var pLng = Number(order.pickup_lng);
        var dLat = Number(order.drop_lat);
        var dLng = Number(order.drop_lng);

        if (Number.isFinite(pLat) && Number.isFinite(pLng)) {
          if (!pickupMarker) {
            pickupMarker = L.marker([pLat, pLng], {
              title: "بداية",
              icon: endpointIcon("بداية", "#0f766e"),
            })
              .addTo(map)
              .bindPopup("🟢 بداية التوصيل (الاستلام)");
          } else {
            pickupMarker.setLatLng([pLat, pLng]);
          }
        }

        if (Number.isFinite(dLat) && Number.isFinite(dLng)) {
          if (!dropMarker) {
            dropMarker = L.marker([dLat, dLng], {
              title: "نهاية",
              icon: endpointIcon("نهاية", "#b91c1c"),
            })
              .addTo(map)
              .bindPopup("🔴 نهاية التوصيل (التسليم)");
          } else {
            dropMarker.setLatLng([dLat, dLng]);
          }
        }
      }

      async function getRoute(a, b) {
        var url =
          "https://router.project-osrm.org/route/v1/driving/" +
          a.lng +
          "," +
          a.lat +
          ";" +
          b.lng +
          "," +
          b.lat +
          "?overview=full&geometries=geojson";
        var r = await fetch(url);
        var j = await r.json();
        if (!j.routes || !j.routes[0]) throw new Error("تعذر حساب المسار");
        return j.routes[0];
      }

      async function updateRouteLine(order) {
        initDriverMap();
        if (!map || !order) return;
        var pLat = Number(order.pickup_lat);
        var pLng = Number(order.pickup_lng);
        var dLat = Number(order.drop_lat);
        var dLng = Number(order.drop_lng);
        if (!Number.isFinite(pLat) || !Number.isFinite(pLng) || !Number.isFinite(dLat) || !Number.isFinite(dLng)) {
          if (routeLine) {
            map.removeLayer(routeLine);
            routeLine = null;
          }
          lastRouteKey = "";
          return;
        }

        var routeKey = [pLat.toFixed(6), pLng.toFixed(6), dLat.toFixed(6), dLng.toFixed(6)].join("|");
        if (routeLine && lastRouteKey === routeKey) return;
        try {
          var route = await getRoute({ lat: pLat, lng: pLng }, { lat: dLat, lng: dLng });
          if (routeLine) map.removeLayer(routeLine);
          routeLine = L.geoJSON(route.geometry, {
            style: { color: "#2563eb", weight: 4, opacity: 0.85 },
          }).addTo(map);
          lastRouteKey = routeKey;
          if (pickupMarker && dropMarker) {
            var group = L.featureGroup([pickupMarker, dropMarker, routeLine]);
            map.fitBounds(group.getBounds(), { padding: [24, 24] });
          }
        } catch (e) {}
      }

      function shouldSend(lat, lng) {
        var now = Date.now();
        if (lastLat == null || lastLng == null) return true;
        var moved = Math.abs(lat - lastLat) + Math.abs(lng - lastLng) > 0.00005;
        var timePassed = now - lastSentAt > 5000;
        return moved || timePassed;
      }

      async function sendLocation(lat, lng, explicitOrderId) {
        if (sendingLocation) return;
        var orderId = explicitOrderId != null ? explicitOrderId : activeOrderId;
        sendingLocation = true;
        try {
          var body = { lat: lat, lng: lng };
          if (orderId) body.order_id = orderId;
          await window.PlatformAPI.api("/api/driver/update-location", {
            method: "POST",
            body: body,
          });
          updateDriverMarker(lat, lng);
          lastLat = lat;
          lastLng = lng;
          lastSentAt = Date.now();
          if (activeOrderId) {
            locStatus.textContent = "آخر إرسال: " + new Date().toLocaleTimeString("ar-SA");
          } else {
            locStatus.textContent = "تم تحديث موقعك للمنصة: " + new Date().toLocaleTimeString("ar-SA");
          }
          checkProximityAuto(lat, lng);
          refreshDockUI();
        } catch (e) {
          locStatus.textContent = "خطأ إرسال الموقع: " + (e.message || e);
        } finally {
          sendingLocation = false;
        }
      }

      async function patchOrderStatus(orderId, status) {
        await window.PlatformAPI.api("/api/delivery/orders/" + encodeURIComponent(orderId) + "/status", {
          method: "PATCH",
          body: { status: status },
        });
      }

      async function checkProximityAuto(lat, lng) {
        var o = navOrderRef;
        if (!o || !o.id) return;
        resetAutoGatesForOrder(o.id);
        var st = String(o.delivery_status || o.status || "").toLowerCase();

        var pLat = Number(o.pickup_lat);
        var pLng = Number(o.pickup_lng);
        var dLat = Number(o.drop_lat);
        var dLng = Number(o.drop_lng);

        if (st === "accepted" && !autoPickupSent && Number.isFinite(pLat) && Number.isFinite(pLng)) {
          var dp = haversineM(lat, lng, pLat, pLng);
          if (dp <= PROXIMITY_M) {
            autoPickupSent = true;
            try {
              await patchOrderStatus(o.id, "delivering");
              speakArabic("أنت قريب من الاستلام. تم تسجيل بدء التوصيل تلقائياً.");
              showSuccess("تم بدء التوصيل (قرب نقطة الاستلام)");
              await loadOrders();
            } catch (e) {
              autoPickupSent = false;
              showError(e.message || "تعذر تحديث الحالة");
            }
          }
        }

        if (st === "delivering" && !autoDeliverSent && Number.isFinite(dLat) && Number.isFinite(dLng)) {
          var dd = haversineM(lat, lng, dLat, dLng);
          if (dd <= PROXIMITY_M) {
            autoDeliverSent = true;
            try {
              await patchOrderStatus(o.id, "delivered");
              speakArabic("أنت قريب من موقع التسليم. تم إنهاء الطلب تلقائياً.");
              showSuccess("تم التسليم");
              activeOrderId = null;
              stopLocationLoop();
              stopProximityLoop();
              await loadOrders();
            } catch (e) {
              autoDeliverSent = false;
              showError(e.message || "تعذر إتمام التسليم");
            }
          }
        }
      }

      function startProximityLoop() {
        if (proximityTimer != null) return;
        proximityTimer = setInterval(function () {
          if (!navOrderRef || !activeOrderId) return;
          navigator.geolocation.getCurrentPosition(
            function (pos) {
              checkProximityAuto(pos.coords.latitude, pos.coords.longitude);
              refreshDockUI();
            },
            function () {},
            { enableHighAccuracy: true, maximumAge: 4000, timeout: 12000 }
          );
        }, 5000);
      }

      function stopProximityLoop() {
        if (proximityTimer != null) {
          clearInterval(proximityTimer);
          proximityTimer = null;
        }
      }

      function onGeoError(err) {
        console.log("GPS error:", err && err.message);
        locStatus.innerText = "⚠️ تعذّر تحديد الموقع — حاول تفعيل GPS";
        if (activeOrderId) {
          void (async function () {
            if (sendingGpsError) return;
            sendingGpsError = true;
            try {
              await window.PlatformAPI.api(
                "/api/delivery/orders/" + encodeURIComponent(activeOrderId) + "/location",
                { method: "POST", body: { gps_error: true } }
              );
            } catch (e) {
              console.log("report gps_error:", e && e.message);
            } finally {
              sendingGpsError = false;
            }
          })();
        }
        setTimeout(function () {
          startLocationLoop();
        }, 5000);
      }

      function err(m) {
        var e = document.getElementById("err");
        e.style.display = "block";
        e.textContent = m;
      }

      function showSuccess(msg) {
        var el = document.createElement("div");
        el.innerText = msg;
        el.style.position = "fixed";
        el.style.bottom = "20px";
        el.style.right = "20px";
        el.style.background = "green";
        el.style.color = "#fff";
        el.style.padding = "10px";
        el.style.borderRadius = "8px";
        el.style.zIndex = "99999";
        document.body.appendChild(el);
        setTimeout(function () {
          el.remove();
        }, 2500);
      }

      function showError(msg) {
        var el = document.createElement("div");
        el.innerText = msg;
        el.style.position = "fixed";
        el.style.bottom = "20px";
        el.style.right = "20px";
        el.style.background = "red";
        el.style.color = "#fff";
        el.style.padding = "10px";
        el.style.borderRadius = "8px";
        el.style.zIndex = "99999";
        document.body.appendChild(el);
        setTimeout(function () {
          el.remove();
        }, 2500);
      }

      async function loadMe() {
        var j = await window.PlatformAPI.api("/api/core/me");
        if (j.user && j.user.id) myUserId = String(j.user.id);
        document.getElementById("who").textContent =
          "الدور: " + (j.profile && j.profile.role) + " — " + (j.user && j.user.phone);
        if (j.profile && j.profile.role !== "driver") {
          err("هذه الصفحة للمندوبين. من صفحة الدخول اختر «مندوب» ثم سجّل الدخول.");
        }
      }

      function renderStars(avg) {
        var a = Math.max(0, Math.min(5, Number(avg) || 0));
        var full = Math.floor(a);
        var half = a % 1 >= 0.5 && full < 5;
        var stars = "⭐".repeat(full);
        if (half) stars += "☆";
        var used = full + (half ? 1 : 0);
        stars += "✩".repeat(5 - used);
        return stars;
      }

      async function loadDriverRating() {
        var el = document.getElementById("driverRatingLine");
        if (!el) return;
        try {
          var j = await window.PlatformAPI.api("/api/driver/rating");
          var c = j.count != null ? j.count : 0;
          if (!c || j.avg == null) {
            el.textContent = "لا توجد تقييمات بعد";
            return;
          }
          var avgNum = Number(j.avg);
          var avgStr = Number.isFinite(avgNum) ? avgNum.toFixed(1) : String(j.avg);
          el.innerText = renderStars(avgNum) + "\n" + avgStr + " من 5 (" + c + " تقييم)";
        } catch (e) {
          el.textContent = "—";
        }
      }

      var STATUS_AR = {
        new: "جديد — بانتظار مندوب",
        pending: "في الانتظار",
        accepted: "تم استلام الطلب",
        delivering: "جاري التوصيل",
        delivered: "تم التسليم",
      };

      function getDistToPickup(o) {
        if (lastLat == null || lastLng == null || !o) return null;
        var pLat = Number(o.pickup_lat);
        var pLng = Number(o.pickup_lng);
        if (!Number.isFinite(pLat) || !Number.isFinite(pLng)) return null;
        return haversineM(lastLat, lastLng, pLat, pLng);
      }

      function getDistToDrop(o) {
        if (lastLat == null || lastLng == null || !o) return null;
        var dLat = Number(o.drop_lat);
        var dLng = Number(o.drop_lng);
        if (!Number.isFinite(dLat) || !Number.isFinite(dLng)) return null;
        return haversineM(lastLat, lastLng, dLat, dLng);
      }

      function refreshDockUI() {
        var dock = document.getElementById("driverMapNavDock");
        var chip = document.getElementById("driverOrderChip");
        var main = document.getElementById("driverMainAction");
        if (!dock || !main) return;

        var po = pendingOrderRef;
        var to = navOrderRef;
        var showDock = !!(po || to);
        if (!showDock) {
          dock.classList.remove("is-visible");
          document.body.classList.remove("driver-nav-dock-active");
          main.disabled = true;
          main.textContent = "—";
          main.className = "driver-main-action";
          driverMainActionKind = "";
          if (chip) chip.textContent = "";
          return;
        }

        dock.classList.add("is-visible");
        document.body.classList.add("driver-nav-dock-active");

        if (po && !to) {
          var num0 = (po.order_number && String(po.order_number).trim()) || String(po.id).slice(0, 8) + "…";
          if (chip) chip.textContent = "طلب مفتوح: " + num0;
          main.disabled = false;
          main.textContent = "قبول الطلب";
          main.className = "driver-main-action mode-pending";
          driverMainActionKind = "pending";
          return;
        }

        if (to) {
          resetAutoGatesForOrder(to.id);
          var num = (to.order_number && String(to.order_number).trim()) || String(to.id).slice(0, 8) + "…";
          var st = String(to.delivery_status || to.status || "").toLowerCase();
          if (chip) chip.textContent = "الطلب " + num + " — " + (STATUS_AR[st] || st);

          var dPickup = getDistToPickup(to);
          var dDrop = getDistToDrop(to);

          if (st === "accepted") {
            main.disabled =
              !Number.isFinite(Number(to.pickup_lat)) || !Number.isFinite(Number(to.pickup_lng));
            main.textContent = "الذهاب للاستلام";
            main.className = "driver-main-action mode-nav";
            driverMainActionKind = "accepted";
          } else if (st === "delivering") {
            var nearDrop = dDrop != null && dDrop <= NEAR_DROP_MANUAL_M;
            if (nearDrop) {
              main.disabled = false;
              main.textContent = "تم التسليم";
              main.className = "driver-main-action mode-finish";
              driverMainActionKind = "delivering";
            } else {
              main.disabled =
                !Number.isFinite(Number(to.drop_lat)) || !Number.isFinite(Number(to.drop_lng));
              main.textContent = "الذهاب للتسليم";
              main.className = "driver-main-action mode-nav";
              driverMainActionKind = "picked";
            }
          } else {
            main.disabled = true;
            main.textContent = "—";
            main.className = "driver-main-action";
            driverMainActionKind = "";
          }

          if (dPickup != null && st === "accepted") {
            locStatus.textContent =
              "المسافة لنقطة الاستلام: ≈ " + Math.round(dPickup) + " م — عند " + PROXIMITY_M + "م يُكمَى بدء التوصيل تلقائياً.";
          } else if (dDrop != null && st === "delivering") {
            locStatus.textContent =
              "المسافة للتسليم: ≈ " + Math.round(dDrop) + " م — عند " + PROXIMITY_M + "م يُكمَى التسليم تلقائياً.";
          }
        }
      }

      function updateNavDockCombined(trackOrder, pendingOrder) {
        navOrderRef = trackOrder && trackOrder.id != null ? trackOrder : null;
        pendingOrderRef = pendingOrder && pendingOrder.id != null ? pendingOrder : null;
        setUltraMode(!!navOrderRef);
        refreshDockUI();
      }

      async function loadOrders() {
        var j = await window.PlatformAPI.api("/api/driver/orders");
        var box = document.getElementById("orders");
        box.innerHTML = "";
        var orders = j.orders || [];
        var ids = orders.map(function (o) {
          return o.id;
        });
        var newOrders = ids.filter(function (id) {
          return knownOrders.indexOf(id) === -1;
        });
        if (newOrders.length) {
          try {
            new Audio("/sound.mp3").play();
          } catch (e) {}
        }
        knownOrders = ids;

        var pendingOrder = orders.find(function (o) {
          var s = String(o.delivery_status || o.status || "").toLowerCase();
          return (s === "new" || s === "pending") && !o.driver_id;
        });

        orders.forEach(function (o) {
          var div = document.createElement("div");
          div.className = "order-row";
          var deliveryStatus = o.delivery_status || o.status;
          var st = STATUS_AR[deliveryStatus] || deliveryStatus;
          var num = (o.order_number && String(o.order_number).trim()) || o.id.slice(0, 8) + "…";
          var src = (o.series_source && String(o.series_source)) || "";
          var isKabsar = /kabsar/i.test(src);
          var sourceTag = isKabsar ? "🍛 كبسار" : "🌐 المنصة";
          var extLine =
            o.external_order_id != null && String(o.external_order_id) !== ""
              ? " — " + o.external_order_id
              : "";
          var phone = isLoggedIn ? (o.customer_phone || "—") : "**********";
          div.innerHTML =
            "<strong><span class=\"ord-no\" translate=\"no\">" +
            num +
            "</span></strong> <span class=\"badge\" style=\"margin-inline-start:6px\">" +
            st +
            "</span><br/><div class=\"sub order-source\" style=\"margin:4px 0 2px; font-size:0.9rem\" translate=\"no\">" +
            sourceTag +
            extLine +
            "</div><br/><small>" +
            (o.drop_address || "") +
            "</small><br/><small>هاتف زائر المنصة: " +
            phone +
            "</small><br/>" +
            '<a class="btn btn-ghost" style="margin-top:8px;display:inline-block" href="/track?id=' +
            encodeURIComponent(o.id) +
            '">تتبع</a>';
          box.appendChild(div);
        });

        var trackOrder =
          orders.find(function (x) {
            return (
              (x.delivery_status || x.status) === "delivering" &&
              myUserId &&
              x.driver_id &&
              String(x.driver_id) === myUserId
            );
          }) ||
          orders.find(function (x) {
            return (
              (x.delivery_status || x.status) === "accepted" &&
              myUserId &&
              x.driver_id &&
              String(x.driver_id) === myUserId
            );
          });

        updateNavDockCombined(trackOrder, pendingOrder);

        if (trackOrder) {
          updateOrderEndpoints(trackOrder);
          void updateRouteLine(trackOrder);
          if (String(activeOrderId) !== String(trackOrder.id)) {
            stopLocationLoop();
            activeOrderId = trackOrder.id;
            startLocationLoop();
            startProximityLoop();
          } else if (!isWatching) {
            startLocationLoop();
            startProximityLoop();
          }
        } else {
          clearOrderEndpoints();
          activeOrderId = null;
          stopLocationLoop();
          stopProximityLoop();
        }
        void loadDriverRating();
      }

      function stopLocationLoop() {
        if (locTimer != null) {
          clearInterval(locTimer);
          locTimer = null;
        }
        isWatching = false;
        lastLat = null;
        lastLng = null;
        lastSentAt = 0;
        locStatus.textContent = "لا يوجد طلب مُستلَم. موقعك ما زال يُحدَّث للمنصة.";
      }

      function startLocationLoop() {
        if (isWatching) return;
        if (!activeOrderId) return;
        isWatching = true;
        lastLat = null;
        lastLng = null;
        lastSentAt = 0;

        locTimer = setInterval(function () {
          if (!activeOrderId) return;
          navigator.geolocation.getCurrentPosition(
            async function (pos) {
              var lat = pos.coords.latitude;
              var lng = pos.coords.longitude;
              if (!shouldSend(lat, lng)) return;
              await sendLocation(lat, lng);
            },
            onGeoError,
            { enableHighAccuracy: false, maximumAge: 5000, timeout: 10000 }
          );
        }, 5000);
        navigator.geolocation.getCurrentPosition(
          async function (pos) {
            var lat = pos.coords.latitude;
            var lng = pos.coords.longitude;
            await sendLocation(lat, lng);
          },
          onGeoError,
          { enableHighAccuracy: false, maximumAge: 5000, timeout: 10000 }
        );
        locStatus.textContent = "جارٍ تتبّع الموقع…";
      }

      function startPresenceLocationLoop() {
        if (presenceTimer != null) return;
        presenceTimer = setInterval(function () {
          navigator.geolocation.getCurrentPosition(
            async function (pos) {
              var lat = pos.coords.latitude;
              var lng = pos.coords.longitude;
              await sendLocation(lat, lng, null);
            },
            function () {},
            { enableHighAccuracy: false, maximumAge: 10000, timeout: 12000 }
          );
        }, 15000);
        navigator.geolocation.getCurrentPosition(
          async function (pos) {
            await sendLocation(pos.coords.latitude, pos.coords.longitude, null);
          },
          function () {},
          { enableHighAccuracy: false, maximumAge: 10000, timeout: 12000 }
        );
      }

      document.getElementById("driverMainAction").onclick = async function () {
        var po = pendingOrderRef;
        var to = navOrderRef;
        var kind = driverMainActionKind;

        if (kind === "pending" && po && !to) {
          var oid = String(po.id != null ? po.id : "").trim();
          if (!oid) return err("معرّف الطلب مفقود");
          try {
            var a = await window.PlatformAPI.api("/api/driver/accept/" + encodeURIComponent(oid), {
              method: "POST",
            });
            if (!a.ok || a.accepted === false) {
              showError((a && a.message) || "تم استلام الطلب من مندوب آخر");
              return;
            }
            speakArabic("تم قبول الطلب.");
            showSuccess("تم قبول الطلب");
            await loadOrders();
          } catch (e) {
            err(e.message || String(e));
          }
          return;
        }

        if (!to) return;

        if (kind === "accepted") {
          speakArabic("اتجه إلى نقطة الاستلام.");
          openGoogleMapsDir(to.pickup_lat, to.pickup_lng);
          return;
        }

        if (kind === "picked") {
          speakArabic("اتجه إلى نقطة التسليم.");
          openGoogleMapsDir(to.drop_lat, to.drop_lng);
          return;
        }

        if (kind === "delivering") {
          try {
            await patchOrderStatus(to.id, "delivered");
            speakArabic("تم تسجيل التسليم.");
            showSuccess("تم إنهاء رحلة التوصيل");
            activeOrderId = null;
            stopLocationLoop();
            stopProximityLoop();
            await loadOrders();
          } catch (e) {
            showError(e.message || "تعذر إتمام التسليم");
          }
        }
      };

      document.getElementById("btnRefresh").onclick = function () {
        loadOrders();
      };

      document.getElementById("driverLogout").onclick = function (e) {
        e.preventDefault();
        if (pollTimer) clearInterval(pollTimer);
        stopLocationLoop();
        stopProximityLoop();
        window.PlatformAPI.setToken("");
        location.href = "/login";
      };

      (async function () {
        initDriverMap();
        await loadMe();
        await loadOrders();
        pollTimer = setInterval(loadOrders, 8000);
        startPresenceLocationLoop();
      })();
    </script>
  </body>
</html>
