<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>بوابة المندوب | ERVENOW</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <style>
      body { margin: 0; font-family: Cairo, sans-serif; background: #f8f4ef; color: #2b1f16; }
      .wrap { max-width: 980px; margin: 24px auto; padding: 16px; display: grid; gap: 16px; grid-template-columns: repeat(auto-fit,minmax(300px,1fr)); }
      .card { background: #fff; border: 1px solid #e5d8cb; border-radius: 16px; padding: 18px; box-shadow: 0 8px 20px rgba(84,52,31,.08); }
      h1,h2 { margin: 0 0 10px; color: #5b371d; }
      p { margin: 0 0 12px; color: #6e5a4a; }
      label { display: block; margin: 8px 0 4px; font-weight: 700; }
      input,select,button { width: 100%; box-sizing: border-box; border-radius: 10px; border: 1px solid #d9c8b7; padding: 11px; font-family: inherit; }
      button { background: #5b371d; color: #fff; border: 0; cursor: pointer; font-weight: 700; margin-top: 10px; }
      button:disabled { opacity: .6; cursor: not-allowed; }
      .ghost { background: #fff; color: #5b371d; border: 1px solid #5b371d; }
      .row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h1>تسجيل دخول المندوب</h1>
        <p>ادخل رقم الجوال ثم استلم رمز OTP.</p>
        <label>رقم الجوال</label>
        <input id="loginPhone" placeholder="05xxxxxxxx" />
        <label>رمز الدخول</label>
        <input id="loginCode" placeholder="12345" />
        <div class="row">
          <button id="sendOtpBtn">إرسال الكود</button>
          <button id="verifyBtn">تسجيل الدخول</button>
        </div>
        <p id="devOtpLine"></p>
      </div>

      <div class="card">
        <h2>تسجيل مندوب جديد</h2>
        <p>سيتم إنشاء حسابك بحالة pending حتى موافقة الإدارة.</p>
        <label>الاسم الكامل</label>
        <input id="regName" />
        <label>رقم الجوال</label>
        <input id="regPhone" placeholder="05xxxxxxxx" />
        <label>رقم الهوية / الإقامة</label>
        <input id="regIqama" />
        <label>نوع المركبة</label>
        <select id="regCarType">
          <option value="">اختر</option>
          <option value="car">سيارة</option>
          <option value="bike">دراجة</option>
          <option value="motorcycle">دباب</option>
        </select>
        <label>رقم اللوحة</label>
        <input id="regPlate" />
        <button id="registerBtn">تسجيل المندوب</button>
      </div>
    </div>

    <script src="/assets/cart.js"></script>
    <script src="/assets/api.js"></script>
    <script>
      function getVal(id) {
        var el = document.getElementById(id);
        return (el && el.value || "").trim();
      }

      var sendOtp = safeClick(async function () {
        var btn = document.getElementById("sendOtpBtn");
        var old = btn.innerText;
        btn.disabled = true;
        btn.innerText = "جارٍ الإرسال...";
        try {
          var j = await window.PlatformAPI.api("/api/driver/send-otp", {
            method: "POST",
            body: { phone: getVal("loginPhone") },
          });
          showSuccess("تم إرسال الرمز");
          var line = document.getElementById("devOtpLine");
          line.innerText = j.dev_otp ? "رمز التطوير: " + j.dev_otp : "";
        } catch (e) {
          showError(e.message || "فشل إرسال الرمز");
        } finally {
          btn.disabled = false;
          btn.innerText = old;
        }
      });

      var verifyOtp = safeClick(async function () {
        var btn = document.getElementById("verifyBtn");
        var old = btn.innerText;
        btn.disabled = true;
        btn.innerText = "جارٍ التحقق...";
        try {
          var j = await window.PlatformAPI.api("/api/driver/verify-otp", {
            method: "POST",
            body: { phone: getVal("loginPhone"), code: getVal("loginCode") },
          });
          if (!j.token) throw new Error("لم يتم إصدار جلسة");
          window.PlatformAPI.setToken(j.token);
          showSuccess("تم تسجيل الدخول");
          setTimeout(function () {
            location.href = "/driver-dashboard";
          }, 500);
        } catch (e) {
          showError(e.message || "فشل تسجيل الدخول");
        } finally {
          btn.disabled = false;
          btn.innerText = old;
        }
      });

      var registerDriver = safeClick(async function () {
        var btn = document.getElementById("registerBtn");
        var old = btn.innerText;
        btn.disabled = true;
        btn.innerText = "جارٍ التسجيل...";
        try {
          await window.PlatformAPI.api("/api/driver/register", {
            method: "POST",
            body: {
              name: getVal("regName"),
              phone: getVal("regPhone"),
              iqama: getVal("regIqama"),
              car_type: getVal("regCarType"),
              plate_number: getVal("regPlate"),
            },
          });
          showSuccess("تم تسجيلك — بانتظار الموافقة");
        } catch (e) {
          showError(e.message || "فشل التسجيل");
        } finally {
          btn.disabled = false;
          btn.innerText = old;
        }
      });

      document.getElementById("sendOtpBtn").onclick = sendOtp;
      document.getElementById("verifyBtn").onclick = verifyOtp;
      document.getElementById("registerBtn").onclick = registerDriver;
    </script>
  </body>
</html>
